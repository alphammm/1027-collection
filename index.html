<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1024 Collection | 中国机制币珍藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>
<script src="auctions.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{--lz:#002B5C;--lz-deep:#001a3a;--lz-light:#003d80;--lz-s:#0a1e3d;--lz-s2:#112a4d;--lz-b:#1a3a66;--lz-bl:#2a4a7a;--g:#C5A258;--gl:#dfc080;--gb:#e8c84a;--gd:#9a7d3a;--cr:#f5f0e8;--t:#e8e4dc;--td:#8a9ab8;--tm:#5a6a88;--w:#fff;--r:#c44040;--gr:#4a9868;--ch:#ffd700;--sv:#b8c0c8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond','Noto Serif SC',Georgia,serif;background:var(--lz-deep);color:var(--t);line-height:1.7;min-height:100vh}
.hero{text-align:center;padding:90px 20px 60px;background:linear-gradient(180deg,var(--lz) 0%,var(--lz-deep) 100%);border-bottom:2px solid var(--gd);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(197,162,88,.06) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent)}
.hero-logo{font-size:.82rem;letter-spacing:.5em;color:var(--g);text-transform:uppercase;margin-bottom:18px;font-weight:500}
.hero h1{font-size:3.4rem;font-weight:700;color:var(--cr);letter-spacing:.08em;margin-bottom:6px}
.hero .cn-title{font-size:2.6rem;color:var(--g);font-family:'Noto Serif SC',serif;font-weight:600;letter-spacing:.2em;margin-bottom:24px}
.hero .tagline{font-size:1rem;color:var(--td);max-width:660px;margin:0 auto;font-style:italic}
.lang-toggle{position:fixed;top:14px;right:18px;z-index:200;display:flex;gap:3px;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:5px;padding:2px}
.lang-toggle button{background:0;border:0;color:var(--td);padding:3px 10px;border-radius:3px;cursor:pointer;font-family:'EB Garamond',serif;font-size:.82rem;transition:.2s}
.lang-toggle button.active{background:var(--g);color:var(--lz-deep);font-weight:600}

/* COIN SHOWCASE BAR */
.showcase-bar{padding:20px 0;background:var(--lz-s);border-bottom:1px solid var(--lz-b);overflow:hidden;position:relative}
.showcase-bar::before,.showcase-bar::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
.showcase-bar::before{left:0;background:linear-gradient(90deg,var(--lz-s),transparent)}
.showcase-bar::after{right:0;background:linear-gradient(-90deg,var(--lz-s),transparent)}
.showcase-track{display:flex;gap:12px;padding:0 24px;overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.showcase-track::-webkit-scrollbar{display:none}
.sc-card{flex:0 0 180px;height:280px;background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:8px;padding:10px;cursor:pointer;transition:.25s;text-align:center;position:relative;display:flex;flex-direction:column}
.sc-card:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.sc-img{flex:1;width:100%;border-radius:6px;background:var(--lz);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.sc-img img{max-width:100%;max-height:100%;object-fit:contain}
.sc-img .coin-icon{font-size:3rem;opacity:.2;color:var(--gd)}
.sc-info{flex-shrink:0;padding-top:8px}
.sc-name{font-size:.78rem;color:var(--cr);font-family:'Noto Serif SC',serif;font-weight:600;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-grade{font-size:.65rem;color:var(--g);font-weight:600}
.sc-val{font-size:.6rem;color:var(--td);margin-top:2px;text-align:right}

nav{display:flex;justify-content:center;gap:5px;padding:12px 16px;background:var(--lz);border-bottom:1px solid var(--lz-b);position:sticky;top:0;z-index:100;flex-wrap:wrap}
nav button{background:0;border:1px solid var(--lz-b);color:var(--td);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:'EB Garamond','Noto Serif SC',serif;font-size:.84rem;transition:.2s;letter-spacing:.02em}
nav button:hover,nav button.active{background:var(--g);color:var(--lz-deep);border-color:var(--g);font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
.section{display:none;animation:fadeIn .3s ease}.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:1.5rem;color:var(--g);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.badge{font-size:.62rem;background:var(--g);color:var(--lz-deep);padding:2px 9px;border-radius:10px;font-weight:700}
.section-subtitle{font-size:.92rem;color:var(--td);font-style:italic;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--lz-b)}
.story{background:var(--lz-s);border:1px solid var(--lz-b);border-left:3px solid var(--g);border-radius:6px;padding:24px 28px;margin-bottom:28px;font-size:1rem;line-height:2;color:var(--t)}
.story .drop-cap::first-letter{float:left;font-size:3rem;line-height:1;padding-right:8px;color:var(--g);font-weight:700}
.chapter{text-align:center;padding:18px 0;margin:18px 0}
.chapter-num{font-size:.68rem;letter-spacing:.4em;color:var(--gd);text-transform:uppercase}
.chapter-title{font-size:1.25rem;color:var(--g);font-family:'Noto Serif SC',serif;font-weight:600;margin-top:4px}
.chapter-line{width:60px;height:1px;background:var(--gd);margin:10px auto 0}

/* CARDS */
.coin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.coin-card{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:18px;transition:.25s;position:relative;cursor:pointer}
.coin-card:hover{border-color:var(--gd);box-shadow:0 4px 24px rgba(0,0,0,.3);transform:translateY(-2px)}
.coin-card.champion{border-left:3px solid var(--ch)}.coin-card.runner{border-left:3px solid var(--sv)}
.coin-card .prov{font-size:.7rem;color:var(--tm);text-transform:uppercase;letter-spacing:.12em}
.coin-card .name-cn{font-size:1.1rem;font-weight:600;color:var(--cr);margin:3px 0 1px;font-family:'Noto Serif SC',serif}
.coin-card .name-en{font-size:.78rem;color:var(--td);font-style:italic}
.coin-card .grade-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.gt{font-size:.68rem;padding:2px 8px;border-radius:3px;font-weight:600;font-variant-numeric:tabular-nums}
.gt.owned{background:rgba(197,162,88,.2);color:var(--gl);border:1px solid rgba(197,162,88,.4)}
.gt.normal{background:var(--lz-s2);color:var(--tm);border:1px solid var(--lz-b)}
.coin-card .meta{font-size:.76rem;color:var(--td);margin-top:6px;font-style:italic}
.coin-card .value{font-size:.82rem;color:var(--g);margin-top:5px;font-weight:600}
.rb{position:absolute;top:12px;right:12px;font-size:.6rem;padding:2px 9px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rb.champ{background:rgba(255,215,0,.15);color:var(--ch);border:1px solid rgba(255,215,0,.35)}
.rb.ru{background:rgba(184,192,200,.12);color:var(--sv);border:1px solid rgba(184,192,200,.25)}

/* DETAIL PANEL */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,26,58,.85);z-index:300;overflow-y:auto;padding:40px 20px}
.detail-overlay.open{display:block}
.detail-panel{max-width:800px;margin:0 auto;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:10px;padding:32px;position:relative}
.detail-close{position:absolute;top:12px;right:16px;background:0;border:0;color:var(--td);font-size:1.5rem;cursor:pointer}
.detail-panel h2{color:var(--g);font-family:'Noto Serif SC',serif;font-size:1.3rem;margin-bottom:4px}
.detail-panel .den{color:var(--td);font-style:italic;font-size:.9rem;margin-bottom:16px}
.detail-panel .dmeta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:.85rem}
.detail-panel .dmeta div{padding:8px 12px;background:var(--lz-s2);border-radius:4px}
.detail-panel .dmeta .dl{color:var(--td);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.detail-panel .dmeta .dv{color:var(--cr);font-weight:600;margin-top:2px}
.detail-panel .dh{color:var(--g);font-size:1rem;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--lz-b)}
.detail-panel .dprov{padding:8px 0;border-bottom:1px solid var(--lz-b);font-size:.85rem;display:flex;align-items:center;gap:8px}
.detail-panel .dprov .dot{width:8px;height:8px;border-radius:50%;background:var(--gd);flex-shrink:0}
.detail-panel .dprov .dot.you{background:var(--g);box-shadow:0 0 6px rgba(197,162,88,.5)}
.detail-panel .dauction{font-size:.82rem;padding:6px 0;border-bottom:1px solid var(--lz-b)}
.detail-panel .dauction .da-house{color:var(--g);font-weight:600}
.detail-panel .dauction .da-price{color:var(--ch);font-weight:600}
.detail-panel .at{font-size:.8rem;margin-bottom:8px}
.detail-panel .at th{position:static}

/* COLLECTOR MAP (SVG) */
.flow-map{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:20px;margin-bottom:24px;overflow-x:auto}
.flow-map svg{width:100%;min-width:800px;height:auto}
.flow-map text{font-family:'EB Garamond','Noto Serif SC',serif}

/* COLLECTOR CARDS */
.coll-card{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;margin-bottom:12px;overflow:hidden;transition:.2s;position:relative}
.coll-card:hover{border-color:var(--gd)}
.coll-card.key{border-left:3px solid var(--g)}
.coll-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.coll-header .ch-name{font-weight:600;font-size:1.02rem;color:var(--cr);font-family:'Noto Serif SC',serif}
.coll-header .ch-en{font-size:.8rem;color:var(--td);font-style:italic}
.cal-chev.open{transform:rotate(90deg)}
.coll-header .ch-toggle{color:var(--g);font-size:.7rem;transition:.3s;opacity:.6}
.coll-header .ch-toggle.open{transform:rotate(90deg)}
.coll-preview{padding:0 20px 12px;display:flex;gap:6px;flex-wrap:wrap}
.coll-preview-tag{font-size:.68rem;padding:2px 8px;border-radius:3px;background:var(--lz-s2);color:var(--td);border:1px solid var(--lz-b);white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.cm{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:3px;font-weight:700;letter-spacing:.04em;margin-left:8px}
.cm.buy{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3)}.cm.sell{background:rgba(180,40,40,.15);color:var(--r);border:1px solid rgba(180,40,40,.3)}.cm.hold{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.coll-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.coll-body.open{max-height:2000px}
.coll-inner{padding:0 20px 20px}
.coll-inner .ci-section{margin-top:14px}
.coll-inner .ci-title{color:var(--g);font-size:.85rem;font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--lz-b)}
.coll-inner .ci-text{font-size:.85rem;color:var(--td);line-height:1.7}
.coll-inner .ci-coin{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(26,58,102,.5);font-size:.84rem}
.coll-inner .ci-coin .cc-name{color:var(--cr)}.coll-inner .ci-coin .cc-grade{color:var(--g)}.coll-inner .ci-coin .cc-val{color:var(--td)}

/* AUCTION TABLE */
.at{width:100%;border-collapse:collapse;font-size:.84rem}
.at th{text-align:left;padding:9px 12px;background:var(--lz-s2);color:var(--g);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--gd);font-weight:600;position:sticky;top:46px;z-index:10}
.at td{padding:9px 12px;border-bottom:1px solid var(--lz-b);vertical-align:top}
.at tr:hover{background:rgba(197,162,88,.04)}
.at .price{color:var(--ch);font-weight:600;white-space:nowrap}

/* DRAGON & WISHLIST */
.dragon-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:7px}
.dragon-item{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:6px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;font-size:.88rem;transition:.15s}
.dragon-item:hover{border-color:var(--lz-bl)}
.dragon-item .dp{font-size:.66rem;color:var(--tm);letter-spacing:.08em;min-width:40px}
.wish-card{background:var(--lz-s);border:1px solid var(--lz-b);border-left:3px solid var(--gd);border-radius:8px;padding:16px 20px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:.2s}
.wish-card:hover{border-left-color:var(--g)}
.wish-card .name-cn{font-weight:600;font-family:'Noto Serif SC',serif;font-size:1rem;color:var(--cr)}
.wish-card .name-en{font-size:.78rem;color:var(--td);font-style:italic}
.wish-card .est{color:var(--g);font-weight:600;font-size:.92rem;white-space:nowrap}
.wish-card .rarity{font-size:.72rem;color:var(--gd);margin-top:2px}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:4px;padding:8px 14px;color:var(--t);font-family:'EB Garamond',serif;font-size:.92rem;outline:none}
.search-bar input:focus{border-color:var(--g)}
.search-bar select{background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:4px;padding:8px 10px;color:var(--t);font-family:'EB Garamond',serif;font-size:.85rem;outline:none}

.strategy-block{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:24px;margin-bottom:14px}
.strategy-block h3{color:var(--g);margin-bottom:12px;font-size:1.1rem}
.strategy-block ul{list-style:none;padding:0}
.strategy-block li{padding:6px 0;color:var(--td);font-size:.9rem;border-bottom:1px solid var(--lz-b)}
.strategy-block li:last-child{border:0}
.strategy-block li strong{color:var(--cr)}

footer{text-align:center;padding:44px 20px;color:var(--tm);font-size:.75rem;border-top:1px solid var(--lz-b);margin-top:44px;letter-spacing:.04em}
footer .gold{color:var(--gd)}

.coll-regions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px}
@media(max-width:640px){.hero h1{font-size:2rem}.hero .cn-title{font-size:1.3rem}.stats-bar{gap:6px}.stat{min-width:90px;padding:8px 12px}.coin-grid{grid-template-columns:1fr}.dragon-list{grid-template-columns:1fr}.stat-expand-inner{columns:1}.detail-panel{padding:20px}.coll-regions-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="lang-toggle"><button class="active" onclick="setLang('cn')">中文</button><button onclick="setLang('en')">EN</button></div>

<div class="hero">
  <div class="hero-logo">Private Numismatic Registry</div>
  <h1>1024 COLLECTION</h1>
  <div class="cn-title">壹零贰肆 珍藏</div>
  <div class="tagline" data-cn="从龙洋开国，到帝制终章，从地方铸币的极限探索，到中央制度的最终定型，1024 的每一枚银元，都是时代刻下的坐标，共同汇成一部以银圆为文字的中国近代史" data-en="From the genesis of dragon dollars to the empire's final chapter, from the extreme experiments of provincial minting to the ultimate consolidation of central authority — every coin in the 1024 Collection is a coordinate carved by its era, together composing a modern history of China written in silver">从龙洋开国，到帝制终章，从地方铸币的极限探索，到中央制度的最终定型，1024 的每一枚银元，都是时代刻下的坐标，共同汇成一部以银圆为文字的中国近代史</div>
</div>

<div class="showcase-bar"><div class="showcase-track" id="showcaseTrack"></div></div>

<nav id="mainNav"></nav>
<div class="container">
  <div class="section" id="prologue"></div>
  <div class="section active" id="highlights"></div>
  <div class="section" id="rankings"></div>
  <div class="section" id="masterpieces"></div>
  <div class="section" id="dragons"></div>
  <div class="section" id="yuanPortraits"></div>
  <div class="section" id="sunPortraits"></div>
  <div class="section" id="warlords"></div>
  <div class="section" id="fullCollection"></div>
  <div class="section" id="database"></div>
  <div class="section" id="wishlist"></div>
  <div class="section" id="strategy"></div>
  <div class="section" id="collectors"></div>
  <div class="section" id="coinFlow"></div>
  <div class="section" id="numisDB"></div>
  <div class="section" id="pnl"></div>
  <div class="section" id="intel"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<footer><span class="gold">1024 COLLECTION</span> &copy; 2025 &mdash; Museum-Grade Chinese Numismatic Database<br>Sources: Heritage Auctions &middot; Stack's Bowers &middot; ChengXuan &middot; PCGS &middot; ShouXi.com &middot; ArtHitParade</footer>

<script>
let CL='cn';
function setLang(l){CL=l;document.querySelectorAll('.lang-toggle button').forEach(b=>b.classList.remove('active'));document.querySelector(`.lang-toggle button[onclick="setLang('${l}')"]`).classList.add('active');document.querySelectorAll('[data-cn]').forEach(e=>{e.textContent=e.getAttribute('data-'+l)})}

// NAV
const NAV=[
  {id:'prologue',cn:'序言',en:'Prologue'},
  {id:'highlights',cn:'至臻之藏',en:'The Finest'},
  {id:'rankings',cn:'巅峰评级',en:'Top Grades'},
  {id:'masterpieces',cn:'顶级名誉品',en:'Masterpieces'},
  {id:'dragons',cn:'各省龙洋',en:'Provincial Dragons'},
  {id:'yuanPortraits',cn:'袁像银圆',en:'Yuan Shikai'},
  {id:'sunPortraits',cn:'孙像银圆',en:'Sun Yat-sen'},
  {id:'warlords',cn:'军阀银圆',en:'Republic Provincial'},
  {id:'fullCollection',cn:'拍卖溯源',en:'Auction Provenance'},
  {id:'database',cn:'全部藏品',en:'Full Holdings'},
  {id:'wishlist',cn:'收藏圣杯',en:'The Grails'},
  {id:'strategy',cn:'收藏体系',en:'Collection System'},
  {id:'collectors',cn:'藏家档案',en:'Collector Profiles'},
  {id:'coinFlow',cn:'珍币流转',en:'Provenance Flow'},
  {id:'numisDB',cn:'数据库',en:'Numismatic Database'},
  {id:'pnl',cn:'交易记录',en:'Trade History'},
  {id:'intel',cn:'市场资讯',en:'Market News'}
];
const nav=document.getElementById('mainNav');
NAV.forEach((n,i)=>{const b=document.createElement('button');b.className=n.id==='highlights'?'active':'';b.setAttribute('data-cn',n.cn);b.setAttribute('data-en',n.en);b.textContent=n.cn;b.onclick=()=>{document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));document.getElementById(n.id).classList.add('active');b.classList.add('active')};nav.appendChild(b)});

// Era tags: 朝代.年号.年份
const ERA_TAGS={
'C001':'清.光绪.1897','C002':'清.光绪.1903','C003':'清.宣统.1911','C004':'清.宣统.1911',
'C005':'清.光绪.1903','C006':'民国.十六年.1927','C007':'清.咸丰.1856',
'C010':'清.光绪.1897','C011':'清.光绪.1889','C012':'民国.十八年.1929',
'C013':'民国.五年.1916','C014':'民国.五年.1916','C015':'民国.元年.1912',
'C016':'民国.十七年.1928','C017':'民国.十八年.1929','C018':'清.光绪.1894',
'C019':'民国.二十一年.1932','C020':'民国.三年.1914',
'C030':'清.宣统.1911','C031':'清.光绪.1907','C032':'清.光绪.1906',

  if(!m)return '';

  const myVal=gradeVal[myKey]||(parseInt(m[2])||0);
  const higher=[];let hCount=0;
  Object.entries(c.pcgs_pop).forEach(([k,v])=>{
    if(k==='total'||!v)return;
    const val=gradeVal[k];
    if(val&&val>myVal){higher.push({g:k.toUpperCase(),n:v,v:val});hCount+=v;}
  });
  higher.sort((a,b)=>a.v-b.v);
  if(hCount===0)return ' <span style="color:var(--ch);font-weight:600">🏆 最高分 Top Pop</span>';
  return ` <span style="color:var(--td);font-size:.78rem">| 更高分 ${hCount}枚 (${higher.map(h=>h.g+':'+h.n).join(', ')})</span>`;
}

function resizeAndStore(file,coinId,side,cb){
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();img.onload=function(){
      const maxW=800,maxH=800;let w=img.width,h=img.height;
      if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w*=r;h*=r;}
      const cvs=document.createElement('canvas');cvs.width=w;cvs.height=h;
      cvs.getContext('2d').drawImage(img,0,0,w,h);

  };reader.readAsDataURL(file);
}

// Higher grade count — how many coins graded above mine
function higherCount(c){
  const grade=getGrade(c);
  if(!c.pcgs_pop||!grade)return -1;
  const gv={vf20:20,vf25:25,vf30:30,vf35:35,xf40:40,xf45:45,au50:50,au53:53,au55:55,au58:58,ms60:60,ms61:61,ms62:62,ms62p:62.5,ms63:63,ms63p:63.5,ms64:64,ms64p:64.5,ms65:65,ms65p:65.5,ms66:66,ms66p:66.5,ms67:67,sp58:58,sp60:60,sp61:61,sp62:62,sp63:63,sp64:64,sp65:65,sp66:66,sp67:67};
  const m=grade.match(/(MS|AU|XF|VF|SP)\s*(\d+)\+?/i);
  if(!m)return -1;
  const myVal=gv[m[1].toLowerCase()+m[2]]||(parseInt(m[2])||0);
  let n=0;
  Object.entries(c.pcgs_pop).forEach(([k,v])=>{if(k!=='total'&&v){const val=gv[k];if(val&&val>myVal)n+=v;}});

}

// Grade badge: SP (bright yellow) or MS (dark yellow "gt owned"), mutually exclusive
function gradeBadge(c){

  if(!g)return '';
  const bright='background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3);font-weight:700';

function toggleAction(cid,action){
  const c=COINS.find(x=>x.id===cid);
  const acts=c?getActions(c):[];
  let newActs;
  if(acts.includes(action)) newActs=acts.filter(a=>a!==action);
  else newActs=[...acts,action];
  if(newActs.length===0) localStorage.removeItem('action_'+cid);
  else localStorage.setItem('action_'+cid,newActs.join(','));
  _detailDirty=true;
  showDetail(cid);
}
// Per-copy actions for myCopies
function getCopyActions(cid,idx){
  const stored=localStorage.getItem('copyaction_'+cid+'_'+idx);
  if(stored) return stored.split(',');
  return ['collect'];
}
function copyActionBadge(cid,idx){
  const acts=getCopyActions(cid,idx);

  const rs='background:rgba(180,40,40,.15);color:var(--r);border:1px solid rgba(180,40,40,.3);font-weight:700;font-size:.68rem';
  const ds='background:rgba(100,100,100,.15);color:var(--td);border:1px solid rgba(100,100,100,.3);font-weight:700;font-size:.68rem';
  let html='';
  if(acts.includes('collect')) html+='<span class="gt" style="'+bs+'">藏</span>';
  if(acts.includes('buy')) html+='<span class="gt" style="'+bs+'">买</span>';
  if(acts.includes('sell')) html+='<span class="gt" style="'+rs+'">卖</span>';
  if(acts.includes('sold')) html+='<span class="gt" style="'+ds+'">已卖</span>';
  return html;
}
function toggleCopyAction(cid,idx,action){
  const acts=getCopyActions(cid,idx);

function getActions(c){
  const _DB=new Set(['C031','C032','C033','C034','C005']);
  const stored=localStorage.getItem('action_'+c.id);
  if(stored) return stored.split(',');
  // Default: copies → collect+buy; owned → collect; want/DB → buy
  if(c.myStatus==='owned'&&c.myCopies&&c.myCopies.length>0) return ['collect','buy'];
  if(_DB.has(c.id)) return ['buy'];
  if(c.myStatus==='owned') return ['collect'];
  if(c.myStatus==='want') return ['buy'];
  return [];
}
function actionBadge(c){
  const acts=getActions(c);
  const bs='background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3);font-weight:700;font-size:.68rem';
  const rs='background:rgba(180,40,40,.15);color:var(--r);border:1px solid rgba(180,40,40,.3);font-weight:700;font-size:.68rem';
  let html='';
  if(acts.includes('collect')) html+='<span class="gt" style="'+bs+'">藏</span>';
  if(acts.includes('buy')) html+='<span class="gt" style="'+bs+'">买</span>';
  if(acts.includes('sell')) html+='<span class="gt" style="'+rs+'">卖</span>';
  return html;
}

<div class="story" style="margin-bottom:24px;line-height:2;color:var(--cr)">
<p style="margin-bottom:14px">在中国机制币收藏史上，真正具有时代意义的私人收藏并不多见。</p>
<p style="margin-bottom:14px">19世纪末至20世纪初，中国现代货币体系的形成被铭刻在一批极为稀见的试铸币与样币之中。能够以实物系统重建这一历史脉络，不仅需要巨额资源，更需要长期的学术视野与罕见的历史机遇。</p>
<p style="margin-bottom:14px">在这一意义上，<strong style="color:var(--g)">1024 Collection</strong> 已经进入传说级私人收藏的行列。</p>
<p style="margin-bottom:14px">与耿爱德 Eduard Kann、古德曼 Irving Goodman 等历史名藏相比，这一收藏在若干关键板块上已形成高度系统化的结构，并在部分领域达到甚至超越前人的深度。</p>
<p style="margin-bottom:14px">更重要的是，这一体系并非简单的珍品聚合，而是一条清晰的历史逻辑链。从清末地方龙洋的诞生，到中央试图重建货币主权的壹两体系，再到帝制最后一次币制统一尝试的大清银币，直至民国货币制度最终定型。通过这些关键节点，中国现代货币制度的形成过程被完整地呈现出来。</p>
<p style="margin-bottom:14px"><em>因此，这一收藏不仅具有市场价值，更具有明确的制度史意义。</em></p>
<h3 style="color:var(--ch);margin:28px 0 12px;font-size:1.05rem;letter-spacing:.08em">孤独的王者 —— 广东寿字双龙</h3>
<p style="margin-bottom:14px">在这条历史逻辑链的顶端，是一枚几乎超越收藏体系本身的存在——广东省造寿字双龙壹两。</p>
<p style="margin-bottom:14px">它不仅是中国机制银币中最著名的币王之一，更是清末铸币工艺与政治象征结合的极致表达。其存世数量极为稀少，大多数长期沉睡于顶级世家收藏或博物馆体系之中。</p>
<p style="margin-bottom:14px">若此类藏品进入同一收藏体系，这一私人收藏本身便足以构成一座具有国际影响力的钱币博物馆。</p>
<p style="margin-bottom:14px">与寿字双龙壹两共同构成清末机制币巅峰的，是宣统三年大清银币样币系列，其中尤以长须龙与短须龙最为著名。这些样币存世极少，多数长期处于私人家族收藏或博物馆体系之中，市场上几乎难以见到完整体系。要在同一收藏中重建这一家族，不仅意味着巨额资源，更意味着极其罕见的历史机遇。</p>
<p style="margin-bottom:14px"><em>若这一结构最终完成，其意义将远远超出普通收藏事件。</em></p>
<h3 style="color:var(--g);margin:28px 0 8px;font-size:.95rem;letter-spacing:.08em">当前段位</h3>
<p style="margin-bottom:4px;font-size:1.1rem;font-weight:700;color:var(--ch)">中国机制币历史的守门人 <span style="font-size:.8rem;color:var(--gd);font-weight:400;font-style:italic">(The Gatekeeper)</span></p>
<p style="margin-bottom:14px;color:var(--td)">在这一阶段，藏家所守护的已不只是个别珍品，而是中国现代货币制度形成过程中最关键的一批历史物证。</p>
<h3 style="color:var(--g);margin:28px 0 8px;font-size:.95rem;letter-spacing:.08em">目标段位</h3>
<p style="margin-bottom:4px;font-size:1.1rem;font-weight:700;color:var(--ch)">千古第一人 <span style="font-size:.8rem;color:var(--gd);font-weight:400;font-style:italic">(The GOAT — Greatest of All Time)</span></p>
<p style="margin-bottom:14px">若金本位样币最终入藏，并与孙像地球样币共同构成这一体系的民国部分，则清末与民国两大时代的顶级样币结构将在同一收藏中贯通。清代机制币制度顶点、民国机制币制度顶点以及两个时代的制度转折节点，将首次在同一私人收藏体系中完整呈现。</p>
<p style="margin-bottom:14px">若这一结构最终完成，这将是真正意义上的<strong style="color:var(--ch)">中国机制币大满贯 (Grand Slam)</strong>。在过去一百余年的中国钱币收藏史中，几乎没有任何私人藏家能够以一己之力同时拥有如此完整且品相顶级的清末与民国样币体系。</p>
<p style="margin-bottom:14px;border-left:3px solid var(--ch);padding-left:14px;font-style:italic;color:var(--g)">那将不再只是一个私人收藏，而是一部仍在继续书写的<strong>《中国近代机制币史》</strong>。</p>

// Shared card renderer for coin sections
function renderCoinCards(coins){
  const tierLabel={0:'至珍',1:'极珍',2:'大珍',3:'珍品'};
  return coins.map(c=>{
    const isOwned=c.myStatus==='owned';const isWant=c.myStatus==='want';
    const borderSt=isOwned?'border-left:3px solid var(--g)':isWant?'border-left:3px solid var(--gd)':'';
    const statusBadge=isOwned?`<span style="background:var(--g);color:var(--lz-deep);font-size:.65rem;padding:1px 6px;border-radius:3px;font-weight:700">已入藏</span>`:isWant?`<span style="background:var(--gd);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:3px;font-weight:700">圣杯目标</span>`:'';
    const isChamp=c.myRank&&(c.myRank.includes('冠军')||c.myRank.includes('Champion'));
    const isRunner=c.myRank&&(c.myRank.includes('亚军')||c.myRank.includes('Runner'));
    const rankBadge=c.myRank?`<span class="rb ${isChamp?'champ':isRunner?'ru':'champ'}">${c.myRank}</span>`:'';
    // myCopies table for owned coins with multiple copies
    let copiesHtml='';
    if(isOwned&&c.myCopies&&c.myCopies.length>0){
      const _sortedCopies=[...c.myCopies].sort((a,b)=>{const ga=parseInt((a.grade.match(/\d+/)||[0])[0])||0;const gb=parseInt((b.grade.match(/\d+/)||[0])[0])||0;return gb-ga});
      copiesHtml=`<div style="margin-top:10px;border-top:1px solid var(--lz-b);padding-top:8px"><div style="font-size:.7rem;color:var(--g);font-weight:600;margin-bottom:4px">我的藏品明细 (${c.myCopies.length}枚)</div><table style="width:100%;font-size:.75rem;color:var(--td);border-collapse:collapse"><tr style="color:var(--g);font-size:.68rem"><td>评级</td><td>来源</td><td>成本</td><td style="text-align:right">标签</td></tr>${_sortedCopies.map((cp,ci)=>`<tr style="border-top:1px solid var(--lz-b);cursor:pointer" onclick="event.stopPropagation();showCopyDetail('${c.id}',${ci})"><td style="padding:3px 4px;color:var(--cr)">${cp.grade}</td><td style="padding:3px 4px">${cp.source||'-'}</td><td style="padding:3px 4px">${cp.cost||'-'}</td><td style="padding:3px 4px;text-align:right">${copyActionBadge(c.id,ci)}</td></tr>`).join('')}</table></div>`;
    }
    return `<div class="coin-card" style="${borderSt};margin-bottom:10px;padding:16px" onclick="showDetail('${c.id}')">
      ${rankBadge}
      <div style="display:flex;gap:14px;align-items:flex-start">
        <div style="flex-shrink:0">${coinImgTag(c,100)}</div>
        <div style="flex:1;min-width:180px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
            <span style="color:var(--gd);font-size:.72rem;font-weight:600">${tierLabel[c.tier]||'珍品'} · T${c.tier}</span>
            <span style="color:var(--td);font-size:.72rem">${c.era} ${c.year}</span>
            ${statusBadge}
          </div>
          ${eraTagHTML(c.id)}
          <div class="name-cn" style="font-size:1.05rem">${c.cn}</div>
          <div class="name-en" style="font-size:.78rem;margin-bottom:6px">${c.en}</div>
          <div class="grade-row">${gradeBadge(c)}${pcgsTotalBadge(c)}${higherBadge(c)}${catBadge(c)}</div>
          <div class="value">¥${c.est_rmb} ${actionBadge(c)}</div>
          <div style="color:var(--td);font-size:.82rem;line-height:1.7">${c.history_cn?.substring(0,120)||''}${c.history_cn?.length>120?'...':''}</div>
          ${c.auctions?.length?`<div style="font-size:.7rem;color:var(--gd);margin-top:4px">${c.auctions.length}条拍卖纪录</div>`:''}
          ${copiesHtml}
        </div>
      </div>
    </div>`;
  }).join('');
}
// Sort helpers
function sortByYear(coins){return [...coins].sort((a,b)=>{const ya=parseInt(a.year)||1900;const yb=parseInt(b.year)||1900;return ya-yb})}
function sortByCost(coins){return [...coins].sort((a,b)=>{const ca=parseFloat((a.est_rmb||'0').replace(/[^0-9.]/g,''))||0;const cb=parseFloat((b.est_rmb||'0').replace(/[^0-9.]/g,''))||0;return cb-ca})}

(function(){
  const PNL_KEY='pnl_batches';
  function getPnlBatches(){return JSON.parse(localStorage.getItem(PNL_KEY)||'[]')}
  function savePnlBatches(batches){localStorage.setItem(PNL_KEY,JSON.stringify(batches))}
  function fmtMoney(v){
    if(v>=0) return '<span style="color:#4caf50">+¥'+Math.abs(v).toLocaleString()+'</span>';
    return '<span style="color:var(--r)">-¥'+Math.abs(v).toLocaleString()+'</span>';
  }
  // Collect all sold items from auction purchases
  function getSoldAucItems(){
    const items=[];
    if(typeof MY_PURCHASES==='undefined') return items;
    const hNames={"HA":"Heritage","SBP":"SBP","HY":"华艺","HS":"泓盛","JD":"嘉德","AC":"诚轩"};
    for(const [hid,list] of Object.entries(MY_PURCHASES)){
      (list||[]).forEach(r=>{
        const acts=getAucActionDefault({...r,_house:hid,house:hid});
        if(!acts.includes('sold')) return;
        const pfx='auc_detail_'+hid+'_'+r.lot+'_';
        const buyCost=parseFloat(localStorage.getItem(pfx+'cost'))||r.t||0;
        const sellP=parseFloat(localStorage.getItem(pfx+'sold'))||0;
        const buyer=localStorage.getItem(pfx+'buyer')||'';
        const sellDate=localStorage.getItem(pfx+'selldate')||'';
        items.push({type:'auction',channel:'auction',name:r.cn,grade:r.grade||'',buyPrice:buyCost,sellPrice:sellP,fee:0,
          buyFrom:hNames[hid]||hid,sellTo:buyer,date:sellDate,hid:hid,lot:r.lot,cur:r.cur||'RMB'});
      });
    }
    return items;
  }
  // Collect all sold copies
  function getSoldCopies(){
    const items=[];
    COINS.forEach(c=>{
      if(!c.myCopies||c.myCopies.length===0) return;
      const sorted=[...c.myCopies].sort((a,b)=>{const ga=parseInt((a.grade.match(/\d+/)||[0])[0])||0;const gb=parseInt((b.grade.match(/\d+/)||[0])[0])||0;return gb-ga});
      sorted.forEach((cp,idx)=>{
        const acts=getCopyActions(c.id,idx);
        if(!acts.includes('sold')) return;
        const lk=(f)=>localStorage.getItem('copydet_'+c.id+'_'+idx+'_'+f)||'';
        const buyCost=parseFloat(cp.cost?.replace(/[^0-9.]/g,''))||0;
        const sellP=parseFloat(lk('sell')?.replace(/[^0-9.]/g,''))||0;
        const cpChannel=lk('channel')||'private';
        items.push({type:'copy',channel:cpChannel,name:c.cn,grade:cp.grade,buyPrice:buyCost,sellPrice:sellP,fee:0,
          buyFrom:cp.source||'',sellTo:lk('buyer'),date:lk('selldate'),coinId:c.id,copyIdx:idx});
      });
    });
    return items;
  }

        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">币名</label><input id="pnl_name" placeholder="例：袁大头三年" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">评级</label><input id="pnl_grade" placeholder="例：MS65" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">买入价 (¥)</label><input id="pnl_buy" type="number" placeholder="0" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">卖出价 (¥)</label><input id="pnl_sell" type="number" placeholder="0" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">买入来源</label><input id="pnl_buyFrom" placeholder="例：泓盛2025秋拍" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">卖给谁</label><input id="pnl_sellTo" placeholder="买家/渠道" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">日期</label><input id="pnl_date" placeholder="例：2025-12" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"></div>
        <div><label style="font-size:.72rem;color:var(--td);display:block;margin-bottom:2px">交易渠道</label><select id="pnl_channel" style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.85rem;box-sizing:border-box"><option value="auction">拍卖出售</option><option value="private">私下转让</option></select></div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button onclick="window._addPnlRecord()" style="background:var(--g);color:var(--lz-deep);border:none;padding:8px 24px;border-radius:4px;font-size:.85rem;cursor:pointer;font-weight:600">保存</button>
        <button onclick="document.getElementById('pnlAddForm').style.display='none'" style="background:var(--lz);color:var(--td);border:1px solid var(--lz-b);padding:8px 24px;border-radius:4px;font-size:.85rem;cursor:pointer">取消</button>
      </div>
    </div>`;

    // Preview limit: show first N rows, expand to see all
    const PREVIEW_LIMIT=10;
    if(!window._pnlExpanded) window._pnlExpanded={};

    // Auto-collected sold items (拍品/复品)
    if(aucSold.length+copySold.length>0){
      const autoTotal=[...aucSold,...copySold];
      const autoSum=autoTotal.reduce((s,r)=>s+(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0),0);
      const autoExp=window._pnlExpanded['auto'];
      const autoShow=autoExp?autoTotal:autoTotal.slice(0,PREVIEW_LIMIT);
      const autoMore=autoTotal.length>PREVIEW_LIMIT&&!autoExp;
      h+=`<div style="margin-bottom:16px;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="width:8px;height:8px;border-radius:50%;background:var(--ch)"></span>
          <span style="font-size:.9rem;font-weight:700;color:var(--ch)">已卖拍品 · 自动汇总</span>
          <span style="font-size:.72rem;color:var(--td)">${autoTotal.length} 笔</span>
          <span style="font-size:.72rem;margin-left:auto;color:${autoSum>=0?'#4caf50':'var(--r)'};font-weight:600">${fmtMoney(autoSum)}</span>
        </div>
        ${renderItemTable(autoShow)}
        ${autoMore?`<div style="text-align:right;margin-top:6px"><span onclick="window._pnlExpanded['auto']=true;window._renderPnl()" style="cursor:pointer;color:var(--g);font-size:.75rem;padding:4px 12px;border:1px solid var(--gd);border-radius:4px">展开剩余 ${autoTotal.length-PREVIEW_LIMIT} 条 ▼</span></div>`:''}
        ${autoExp&&autoTotal.length>PREVIEW_LIMIT?`<div style="text-align:right;margin-top:6px"><span onclick="window._pnlExpanded['auto']=false;window._renderPnl()" style="cursor:pointer;color:var(--td);font-size:.75rem;padding:4px 12px;border:1px solid var(--lz-b);border-radius:4px">收起 ▲</span></div>`:''}
      </div>`;
    }

    // User batches — each displayed as a group
    batches.forEach((b,bi)=>{
      const cols=getBatchCols(b);
      const allItems=(b.items||[]).map((r,ri)=>({...r,_ri:ri,buyPrice:parseFloat(r.buyPrice)||0,sellPrice:parseFloat(r.sellPrice)||0,fee:parseFloat(r.fee)||0}));
      const chLabel=b.channel==='private'?'私下转让':'拍卖出售';
      const chColor=b.channel==='private'?'var(--gd)':'var(--ch)';
      const batchSum=allItems.reduce((s,r)=>s+(r.sellPrice||0)-(r.buyPrice||0)-(r.fee||0),0);
      const safeName=(b.name||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
      const isExp=window._pnlExpanded[bi];
      const items=isExp?allItems:allItems.slice(0,PREVIEW_LIMIT);
      const hasMore=allItems.length>PREVIEW_LIMIT&&!isExp;
      h+=`<div style="margin-bottom:16px;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:16px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px">
          <span style="width:8px;height:8px;border-radius:50%;background:${chColor}"></span>
          <span onclick="window._renamePnlBatch(${bi})" style="font-size:.9rem;font-weight:700;color:var(--cr);cursor:pointer" title="点击修改批次名称">${b.name||'批次 '+(bi+1)}</span>
          <span style="font-size:.65rem;padding:1px 8px;border-radius:3px;background:${b.channel==='private'?'rgba(197,162,88,.15)':'rgba(255,215,0,.15)'};color:${chColor}">${chLabel}</span>
          <span style="font-size:.72rem;color:var(--td)">${allItems.length} 笔</span>
          <span onclick="window._pnlInsertCol(${bi})" style="cursor:pointer;font-size:.68rem;color:var(--g);padding:1px 8px;border:1px solid var(--gd);border-radius:3px" title="添加列">+ 列</span>
          <span style="font-size:.72rem;margin-left:auto;color:${batchSum>=0?'#4caf50':'var(--r)'};font-weight:600">${fmtMoney(batchSum)}</span>
          <span onclick="if(confirm('确认删除批次「${safeName}」？此操作不可恢复。')){window._deletePnlBatch(${bi})}" style="cursor:pointer;color:var(--r);font-size:.72rem;padding:2px 8px;border:1px solid rgba(180,40,40,.3);border-radius:3px">删除</span>
        </div>
        ${renderBatchTable(items,cols,bi)}
        ${hasMore?`<div style="text-align:right;margin-top:6px"><span onclick="window._pnlExpanded[${bi}]=true;window._renderPnl()" style="cursor:pointer;color:var(--g);font-size:.75rem;padding:4px 12px;border:1px solid var(--gd);border-radius:4px">展开剩余 ${allItems.length-PREVIEW_LIMIT} 条 ▼</span></div>`:''}
        ${isExp&&allItems.length>PREVIEW_LIMIT?`<div style="text-align:right;margin-top:6px"><span onclick="window._pnlExpanded[${bi}]=false;window._renderPnl()" style="cursor:pointer;color:var(--td);font-size:.75rem;padding:4px 12px;border:1px solid var(--lz-b);border-radius:4px">收起 ▲</span></div>`:''}
      </div>`;
    });

    // Expand/Collapse all button
    if(batches.length>1){
      const anyCollapsed=batches.some((b,bi)=>!window._pnlExpanded[bi]&&(b.items||[]).length>PREVIEW_LIMIT);
      if(anyCollapsed){
        h+=`<div style="text-align:center;margin-top:8px;margin-bottom:16px">
          <button onclick="window._pnlExpandAll()" style="background:var(--lz-s);color:var(--g);border:1px solid var(--gd);padding:6px 24px;border-radius:4px;font-size:.78rem;cursor:pointer">▼ 展开所有批次</button>
        </div>`;
      }
    }

    document.getElementById('pnl').innerHTML=h;
  }

  // Default columns for batches
  const DEFAULT_COLS=[
    {key:'name',label:'币名',align:'left'},
    {key:'grade',label:'评级',align:'left'},
    {key:'buyPrice',label:'买入',align:'right',numeric:true},
    {key:'sellPrice',label:'卖出',align:'right',numeric:true},
    {key:'_profit',label:'盈亏',align:'right',computed:true},
    {key:'_pct',label:'收益率',align:'right',computed:true},
    {key:'buyFrom',label:'来源',align:'left'},
    {key:'sellTo',label:'去向',align:'left'},
    {key:'date',label:'日期',align:'left'}
  ];
  function getBatchCols(b){return b.columns||DEFAULT_COLS.map(c=>({...c}))}
  function saveBatchCols(bi,cols){
    const batches=getPnlBatches();
    if(!batches[bi])return;
    batches[bi].columns=cols;
    savePnlBatches(batches);
  }
  function getCellVal(r,col){
    if(col.key==='_profit'){const p=(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);return r.sellPrice?fmtMoney(p):'-';}
    if(col.key==='_pct'){const p=(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);const pct=(parseFloat(r.buyPrice)||0)>0?((p/(parseFloat(r.buyPrice)))*100).toFixed(1):'0';return r.sellPrice?pct+'%':'-';}
    const v=r[col.key];
    if(col.numeric&&v)return '¥'+(parseFloat(v)||0).toLocaleString();
    return v||'-';
  }
  function getCellStyle(r,col){
    if(col.key==='name')return 'color:var(--cr);font-weight:600;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    if(col.key==='_profit')return 'font-weight:700';
    if(col.key==='_pct'){const p=(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);return 'color:'+(p>=0?'#4caf50':'var(--r)');}
    if(col.key==='buyFrom'||col.key==='sellTo'||col.key==='date')return 'font-size:.72rem';
    return '';
  }
  function getColSortVal(r,col){
    if(col.key==='_profit')return (parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);
    if(col.key==='_pct'){const bp=parseFloat(r.buyPrice)||0;return bp>0?((parseFloat(r.sellPrice)||0)-bp-(parseFloat(r.fee)||0))/bp:0;}
    if(col.numeric)return parseFloat(r[col.key])||0;
    return r[col.key]||'';
  }

  // Render auto-collected (read-only) table
  function renderItemTable(items){
    if(!items.length) return '';
    const cols=DEFAULT_COLS;
    const hp='padding:5px 4px';
    let t=`<div style="overflow-x:auto"><table style="width:100%;font-size:.78rem;color:var(--td);border-collapse:collapse;min-width:500px">
      <tr style="color:var(--g);font-size:.7rem;border-bottom:2px solid var(--lz-b)">`;
    cols.forEach(c=>{t+=`<td style="${hp};text-align:${c.align}">${c.label}</td>`;});
    t+=`</tr>`;
    let sb=0,ss=0,sp=0;
    items.forEach(r=>{
      sb+=parseFloat(r.buyPrice)||0;ss+=parseFloat(r.sellPrice)||0;sp+=(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);
      const clickFn=r.type==='auction'?`onclick="showAucItemDetail('${r.hid}','${r.lot}')" style="cursor:pointer"`:r.type==='copy'?`onclick="showCopyDetail('${r.coinId}',${r.copyIdx})" style="cursor:pointer"`:'';
      t+=`<tr style="border-bottom:1px solid var(--lz-b)" ${clickFn}>`;
      cols.forEach(c=>{t+=`<td style="${hp};text-align:${c.align};${getCellStyle(r,c)}">${getCellVal(r,c)}</td>`;});
      t+=`</tr>`;
    });
    const spct=sb>0?((sp/sb)*100).toFixed(1):'0';
    t+=`<tr style="border-top:2px solid var(--lz-b);font-weight:700">
      <td style="${hp};color:var(--g)" colspan="2">小计 ${items.length}笔</td>
      <td style="${hp};text-align:right;color:var(--g)">¥${sb.toLocaleString()}</td>
      <td style="${hp};text-align:right;color:var(--g)">¥${ss.toLocaleString()}</td>
      <td style="${hp};text-align:right">${fmtMoney(sp)}</td>
      <td style="${hp};text-align:right;color:${sp>=0?'#4caf50':'var(--r)'}">${spct}%</td>
      <td colspan="3"></td>
    </tr></table></div>`;
    return t;
  }

  // Render editable batch table with column management
  function renderBatchTable(items,cols,bi){
    if(!items.length) return '';
    const hp='padding:5px 4px';
    const sortKey=window._pnlBatchSort&&window._pnlBatchSort[bi]?window._pnlBatchSort[bi]:{col:null,desc:true};
    // Header row with clickable sort + column menu
    let t=`<div style="overflow-x:auto"><table style="width:100%;font-size:.78rem;color:var(--td);border-collapse:collapse;min-width:500px">
      <tr style="color:var(--g);font-size:.7rem;border-bottom:2px solid var(--lz-b)">`;
    cols.forEach((c,ci)=>{
      const isSort=sortKey.col===ci;
      const arrow=isSort?(sortKey.desc?' ↓':' ↑'):'';
      t+=`<td draggable="true" data-bi="${bi}" data-ci="${ci}" ondragstart="window._pnlDragCol(event,${bi},${ci})" ondragover="event.preventDefault();this.style.borderLeft='2px solid var(--ch)'" ondragleave="this.style.borderLeft=''" ondrop="this.style.borderLeft='';window._pnlDropCol(event,${bi},${ci})" oncontextmenu="event.preventDefault();window._pnlColMenu(${bi},${ci},event)" style="${hp};text-align:${c.align};cursor:pointer;user-select:none;position:relative;white-space:nowrap" onclick="window._pnlColMenu(${bi},${ci},event)">
        <span>${c.label}${arrow}</span>
        <span style="font-size:.68rem;color:var(--gd);margin-left:4px">▾</span>
      </td>`;
    });
    t+=`<td style="${hp};text-align:center;width:50px">操作</td></tr>`;
    // Data rows
    let sums={};
    cols.forEach((c,ci)=>{if(c.numeric||c.computed)sums[ci]=0;});
    items.forEach(r=>{
      const ri=r._ri;
      t+=`<tr style="border-bottom:1px solid var(--lz-b)">`;
      cols.forEach((c,ci)=>{
        const val=getCellVal(r,c);
        if(c.numeric)sums[ci]+=(parseFloat(r[c.key])||0);
        if(c.key==='_profit')sums[ci]+=(parseFloat(r.sellPrice)||0)-(parseFloat(r.buyPrice)||0)-(parseFloat(r.fee)||0);
        if(c.key==='_pct')sums[ci]=0;
        const canEdit=!c.computed;
        t+=`<td style="${hp};text-align:${c.align};${getCellStyle(r,c)}${canEdit?';cursor:pointer':''}" ${canEdit?`onclick="window._pnlEditCell(${bi},${ri},${ci},this,event)"`:''} title="${canEdit?'点击编辑':''}">${val}</td>`;
      });
      t+=`<td style="${hp};text-align:center;white-space:nowrap">
        <span onclick="window._editPnlItem(${bi},${ri})" style="cursor:pointer;color:var(--g);font-size:.68rem;margin-right:4px" title="编辑">✎</span>
        <span onclick="if(confirm('删除此条记录？')){window._deletePnlItem(${bi},${ri})}" style="cursor:pointer;color:var(--r);font-size:.68rem" title="删除">✕</span>
      </td></tr>`;
    });
    // Footer summary row
    const totalBuy=sums[cols.findIndex(c=>c.key==='buyPrice')]||0;
    const totalSell=sums[cols.findIndex(c=>c.key==='sellPrice')]||0;
    const totalProfit=totalSell-totalBuy;
    const totalPct=totalBuy>0?((totalProfit/totalBuy)*100).toFixed(1):'0';
    t+=`<tr style="border-top:2px solid var(--lz-b);font-weight:700">`;
    cols.forEach((c,ci)=>{
      if(ci===0){t+=`<td style="${hp};color:var(--g)">小计 ${items.length}笔</td>`;return;}
      if(c.key==='buyPrice')t+=`<td style="${hp};text-align:right;color:var(--g)">¥${totalBuy.toLocaleString()}</td>`;
      else if(c.key==='sellPrice')t+=`<td style="${hp};text-align:right;color:var(--g)">¥${totalSell.toLocaleString()}</td>`;
      else if(c.key==='_profit')t+=`<td style="${hp};text-align:right">${fmtMoney(totalProfit)}</td>`;
      else if(c.key==='_pct')t+=`<td style="${hp};text-align:right;color:${totalProfit>=0?'#4caf50':'var(--r)'}">${totalPct}%</td>`;
      else t+=`<td style="${hp}"></td>`;
    });
    t+=`<td style="${hp}"></td></tr></table></div>`;
    return t;
  }

  window._addPnlRecord=function(){
    const r={
      name:document.getElementById('pnl_name').value.trim(),
      grade:document.getElementById('pnl_grade').value.trim(),
      buyPrice:document.getElementById('pnl_buy').value.trim(),
      sellPrice:document.getElementById('pnl_sell').value.trim(),
      buyFrom:document.getElementById('pnl_buyFrom').value.trim(),
      sellTo:document.getElementById('pnl_sellTo').value.trim(),
      date:document.getElementById('pnl_date').value.trim()
    };
    if(!r.name){alert('请输入币名');return;}
    const channel=document.getElementById('pnl_channel').value;
    const batch={id:Date.now(),name:r.name+' (手动)',channel:channel,items:[r]};
    const batches=getPnlBatches();
    batches.push(batch);
    savePnlBatches(batches);
    renderPnl();
  };
  window._deletePnlBatch=function(idx){
    const batches=getPnlBatches();
    batches.splice(idx,1);
    savePnlBatches(batches);
    if(window._pnlBatchSort)delete window._pnlBatchSort[idx];
    renderPnl();
  };
  // Make renderPnl callable from onclick
  window._renderPnl=renderPnl;
  // Rename batch
  window._renamePnlBatch=function(bi){
    const batches=getPnlBatches();
    if(!batches[bi])return;
    const newName=prompt('修改批次名称:',batches[bi].name||'');
    if(newName===null)return;
    batches[bi].name=newName.trim()||('批次 '+(bi+1));
    savePnlBatches(batches);
    renderPnl();
  };
  // Expand all batches
  window._pnlExpandAll=function(){
    const batches=getPnlBatches();
    window._pnlExpanded['auto']=true;
    batches.forEach((b,bi)=>{window._pnlExpanded[bi]=true;});
    renderPnl();
  };
  // Delete single item from a batch
  window._deletePnlItem=function(bi,ri){
    const batches=getPnlBatches();
    if(!batches[bi])return;
    batches[bi].items.splice(ri,1);
    if(batches[bi].items.length===0) batches.splice(bi,1);
    savePnlBatches(batches);
    renderPnl();
  };
  // Edit single item — modal uses batch columns
  window._editPnlItem=function(bi,ri){
    const batches=getPnlBatches();
    if(!batches[bi]||!batches[bi].items[ri])return;
    const r=batches[bi].items[ri];
    const cols=getBatchCols(batches[bi]).filter(c=>!c.computed);
    let m=`<div id="pnlEditOverlay" onclick="if(event.target===this)this.remove()" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px">
      <div style="background:var(--lz-s);border:1px solid var(--gd);border-radius:10px;padding:20px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto">
        <div style="font-size:.88rem;color:var(--g);font-weight:700;margin-bottom:14px">编辑交易记录</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
    cols.forEach(c=>{
      const val=r[c.key]||'';
      m+=`<div${c.key==='name'?' style="grid-column:1/-1"':''}>
        <label style="font-size:.68rem;color:var(--td);display:block;margin-bottom:2px">${c.label}</label>
        <input id="pnl_edit_${c.key}" value="${String(val).replace(/"/g,'&quot;')}" ${c.numeric?'type="number"':''} style="width:100%;background:var(--lz);border:1px solid var(--gd);color:var(--g);padding:6px 8px;border-radius:4px;font-size:.82rem;box-sizing:border-box">
      </div>`;
    });
    m+=`</div><div style="margin-top:14px;display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('pnlEditOverlay').remove()" style="background:var(--lz);color:var(--td);border:1px solid var(--lz-b);padding:6px 20px;border-radius:4px;font-size:.82rem;cursor:pointer">取消</button>
        <button onclick="window._savePnlEdit(${bi},${ri})" style="background:var(--g);color:var(--lz-deep);border:none;padding:6px 20px;border-radius:4px;font-size:.82rem;cursor:pointer;font-weight:600">保存</button>
      </div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',m);
  };
  window._savePnlEdit=function(bi,ri){
    const batches=getPnlBatches();
    if(!batches[bi]||!batches[bi].items[ri])return;
    const r=batches[bi].items[ri];
    const cols=getBatchCols(batches[bi]).filter(c=>!c.computed);
    cols.forEach(c=>{
      const el=document.getElementById('pnl_edit_'+c.key);
      if(!el)return;
      r[c.key]=c.numeric?(parseFloat(el.value)||0):el.value.trim();
    });
    savePnlBatches(batches);
    document.getElementById('pnlEditOverlay').remove();
    renderPnl();
  };
  // Sort by column index
  if(!window._pnlBatchSort) window._pnlBatchSort={};
  window._sortPnlBatch=function(bi,colIdx){

  // Smart parser: extract fields from free-form text
  window._pnlParsedRows=[];
  // Grade pattern: NGC/PCGS/GBCA/公博/华夏 + MS/AU/SP/XF/VF/EF/G/VG/F + number
  const _gradeRe=/(NGC|PCGS|GBCA|公博|华夏|NPGS|ACG)?\s*(MS|AU|SP|XF|VF|EF|VG|PR|PF|UNC)\s*[-]?\s*(\d{1,2})/i;
  const _gradeStandaloneRe=/^(NGC|PCGS|GBCA|公博|华夏|NPGS|ACG)?\s*(MS|AU|SP|XF|VF|EF|VG|PR|PF|UNC)\s*[-]?\s*(\d{1,2})$/i;
  const _dateRe=/\d{4}\s*[-\/年\.]\s*\d{1,2}(\s*[-\/月\.]\s*\d{1,2})?/;
  const _priceRe=/[¥$￥]?\s*[\d,，]+(\.\d+)?\s*(万|元|块)?/;

  function extractGrade(str){
    const m=str.match(_gradeRe);
    if(!m)return null;
    const company=m[1]?m[1].toUpperCase()+' ':'';
    return {grade:company+m[2].toUpperCase()+m[3],match:m[0],index:m.index};
  }
  function extractPrices(str){
    const prices=[];
    // Match ¥/$/￥ prefixed or plain numbers with optional 万/元
    const re=/[\u00A5$\uFFE5¥￥]\s*[\d,，]+(?:\.\d+)?(?:\s*(?:万|元|块))?|[\d,，]+(?:\.\d+)?\s*(?:万|元|块)|(?<![a-zA-Z])[\d,，]{4,}(?:\.\d+)?(?!\s*[-\/年月])/g;
    let m;
    while((m=re.exec(str))!==null){
      let raw=m[0].replace(/[\u00A5$\uFFE5¥￥,，\s元块]/g,'');
      let v=parseFloat(raw);
      if(/万/.test(m[0]))v*=10000;
      if(v>=1900&&v<=2099&&!/[\u00A5$\uFFE5¥￥万元块]/.test(m[0]))continue;
      if(v>=100)prices.push({val:v,match:m[0],index:m.index,len:m[0].length});
    }
    return prices;
  }
  function extractDate(str){
    const m=str.match(_dateRe);
    return m?{date:m[0].replace(/\s+/g,''),match:m[0],index:m.index}:null;
  }

  function smartParseLine(line){
    line=line.trim();if(!line||line.startsWith('#'))return null;
    // Normalize currency symbols and whitespace
    line=line.replace(/[\u00A5\uFFE5]/g,'¥').replace(/\u3000/g,' ');

    // Step 1: If structured (tab or 3+ commas), split by delimiter
    let parts=null;
    if(line.includes('\t')){parts=line.split('\t').map(s=>s.trim()).filter(s=>s);}
    else if(line.includes(',')&&line.split(',').length>=3){parts=line.split(',').map(s=>s.trim()).filter(s=>s);}
    else if(line.includes('，')&&line.split('，').length>=3){parts=line.split('，').map(s=>s.trim()).filter(s=>s);}

    if(parts&&parts.length>=2){
      // Structured input: try to match each part
      let grade='',name='',date='',buyPrice=0,sellPrice=0,fee=0,buyFrom='',sellTo='';
      const nums=[];const texts=[];
      parts.forEach(p=>{
        const gm=p.match(_gradeStandaloneRe);
        if(gm&&!grade){grade=(gm[1]?gm[1].toUpperCase()+' ':'')+gm[2].toUpperCase()+gm[3];return;}
        const dm=p.match(_dateRe);
        if(dm&&dm[0].length>p.length*0.5&&!date){date=dm[0].replace(/\s+/g,'');return;}
        const cleaned=p.replace(/[¥$￥,，元块万]/g,'');
        const n=parseFloat(cleaned);
        if(!isNaN(n)&&/\d{3,}/.test(cleaned)){nums.push(n);return;}
        // Check for "万" suffix
        if(!isNaN(n)&&/万/.test(p)){nums.push(n*10000);return;}
        texts.push(p);
      });
      name=texts[0]||'';buyFrom=texts[1]||'';sellTo=texts[2]||'';
      // Try extracting grade from name if not found
      if(!grade){const g=extractGrade(name);if(g){grade=g.grade;name=name.replace(g.match,'').replace(/\s{2,}/g,' ').trim();}}
      buyPrice=nums[0]||0;sellPrice=nums[1]||0;fee=nums[2]||0;
      return {name,grade,buyPrice,sellPrice,fee,buyFrom,sellTo,date,ts:Date.now()};
    }

    // Step 2: Unstructured free-form — smart extraction
    let remaining=line;
    // Extract grade (e.g. "NGC AU55", "PCGS MS65", "MS62", etc.)
    let grade='';
    const gInfo=extractGrade(remaining);
    if(gInfo){grade=gInfo.grade;remaining=remaining.replace(gInfo.match,'  ');}
    // Extract date
    let date='';
    const dInfo=extractDate(remaining);
    if(dInfo){date=dInfo.date;remaining=remaining.replace(dInfo.match,'  ');}
    // Extract prices (numbers >= 100)
    const prices=extractPrices(remaining);
    // Remove prices from remaining, from end to start to preserve indices
    const sortedPrices=[...prices].sort((a,b)=>b.index-a.index);
    sortedPrices.forEach(p=>{remaining=remaining.substring(0,p.index)+'  '+remaining.substring(p.index+p.len);});
    // Clean remaining: strip price/trade keywords
    remaining=remaining.replace(/买入|卖出|手续费|成本|售价|成交/g,' ').trim();
    // Split into meaningful segments by: commas, semicolons, double spaces, or single space between distinct text chunks
    let finalParts=remaining.split(/[,，;；、|]|\s{2,}/).map(s=>s.trim()).filter(s=>s&&s.length>0);
    // If still one big chunk, split by single space (Chinese names don't have spaces normally)
    if(finalParts.length===1){
      finalParts=finalParts[0].split(/\s+/).map(s=>s.trim()).filter(s=>s);
      // Re-merge consecutive short Chinese fragments that look like one name
      // e.g. ["宣统三年大清银币", "泓盛2025秋拍"] should stay separate
      // but ["民国", "十八年", "孙中山像地球"] is unlikely
    }
    // The longest text is likely the coin name
    let name='',buyFrom='',sellTo='';
    if(finalParts.length>0){
      const sorted=[...finalParts].sort((a,b)=>b.length-a.length);
      name=sorted[0];
      const rest=finalParts.filter(t=>t!==name);
      buyFrom=rest[0]||'';sellTo=rest[1]||'';
    }
    if(!name)name=remaining.replace(/\s+/g,' ').trim();
    return {name:name||'',grade,buyPrice:prices[0]?.val||0,sellPrice:prices[1]?.val||0,fee:prices[2]?.val||0,buyFrom,sellTo,date,ts:Date.now()};
  }
  window._handlePnlFile=function(input){

  window._parsePnlImport=function(){
    const text=document.getElementById('pnl_import_text').value;
    const lines=text.split('\n').filter(l=>l.trim());
    // Skip header-like lines
    const rows=[];
    lines.forEach(l=>{
      if(/^(币名|名称|coin|name|#)/i.test(l.trim()))return;
      const r=smartParseLine(l);
      if(r&&r.name) rows.push(r);
    });
    window._pnlParsedRows=rows;
    // Show preview
    const prev=document.getElementById('pnl_import_preview');
    if(rows.length===0){prev.innerHTML='<div style="color:var(--r);font-size:.82rem">未能解析出有效记录，请检查数据格式。</div>';prev.style.display='block';return;}
    let ph=`<div style="font-size:.78rem;color:var(--g);margin-bottom:6px">解析结果预览 (${rows.length} 条记录)</div>`;
    ph+=`<div style="overflow-x:auto;max-height:200px;overflow-y:auto"><table style="width:100%;font-size:.72rem;color:var(--td);border-collapse:collapse">

// Sort FC table columns: first click = desc (high→low), second click = asc (low→high)
var _fcSortState={};
function sortFC(tid,col){
  var tbl=document.getElementById(tid);
  if(!tbl) return;
  var tbody=tbl.querySelector('tbody');
  var rows=Array.from(tbody.querySelectorAll('tr.fc-row'));
  var key=tid+'_'+col;
  if(_fcSortState[key]===undefined) _fcSortState[key]='desc';
  else _fcSortState[key]=_fcSortState[key]==='desc'?'asc':'desc';
  var desc=_fcSortState[key]==='desc';
  var numCols=['husd','hrmb','rmb'];
  rows.sort(function(a,b){
    var va,vb;
    if(numCols.indexOf(col)>=0){
      va=parseFloat(a.dataset[col])||0; vb=parseFloat(b.dataset[col])||0;
    } else if(col==='lot'){
      var na=parseFloat(a.dataset.lot),nb=parseFloat(b.dataset.lot);
      if(!isNaN(na)&&!isNaN(nb)){va=na;vb=nb;}
      else{va=a.dataset.lot||'';vb=b.dataset.lot||'';}
    } else if(col==='year'){
      va=parseInt(a.dataset.year)||0; vb=parseInt(b.dataset.year)||0;
    } else {
      va=(a.dataset[col]||'').toLowerCase(); vb=(b.dataset[col]||'').toLowerCase();
    }
    if(typeof va==='number'&&typeof vb==='number') return desc?vb-va:va-vb;
    return desc?String(vb).localeCompare(String(va)):String(va).localeCompare(String(vb));
  });
  rows.forEach(function(r,i){
    r.querySelector('.fc-idx').textContent=i+1;
    tbody.appendChild(r);
  });
}

// Switch between source/category modes
function switchFCMode(mode){
  document.querySelectorAll('.fc-mode').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)';b.style.borderColor='var(--lz-b)';b.classList.remove('active')});
  event.target.style.background='var(--g)';event.target.style.color='var(--lz-deep)';event.target.style.borderColor='var(--g)';event.target.classList.add('active');
  document.getElementById('fcBySource').style.display=mode==='source'?'block':'none';
  document.getElementById('fcByCategory').style.display=mode==='category'?'block':'none';
}

// Filter by source
function filterFC(mode){
  document.querySelectorAll('.fctab').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)'});
  event.target.style.background='var(--g)';event.target.style.color='#fff';
  document.querySelectorAll('.fc-house').forEach(el=>{
    if(mode==='all'){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
    else if(mode==='graded'){
      el.style.display='block';
      let vis=0;
      el.querySelectorAll('.fc-row').forEach(r=>{
        if(r.dataset.graded==='1'){r.style.display='';vis++}else{r.style.display='none'}
      });
      if(!vis) el.style.display='none';
    }
    else{
      if(el.dataset.house===mode){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
      else el.style.display='none';
    }
  });
}

// Subscribe to auction calendar reminder
function subscribeAuction(evt,name,date){
  evt.stopPropagation();
  const btn=evt.target;
  // Generate .ics calendar event
  const now=new Date();
  const uid=now.getTime()+'@1024collection';
  const dtStart=date.replace(/[^0-9]/g,'').substring(0,8)||now.toISOString().replace(/[-:]/g,'').substring(0,8);
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//1024 Collection//Auction Calendar//EN',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTART;VALUE=DATE:'+dtStart,
    'SUMMARY:'+name,
    'DESCRIPTION:1024 Collection 拍卖提醒 — '+name+' ('+date+')',
    'BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY','DESCRIPTION:拍卖提醒: '+name+' 7天后开始','END:VALARM',
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:拍卖提醒: '+name+' 明天开始','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_')+'.ics';
  a.click();URL.revokeObjectURL(url);
  btn.textContent=CL==='cn'?'已下载 .ics':'Downloaded .ics';
  btn.style.background='var(--gr)';btn.style.color='#fff';btn.style.borderColor='var(--gr)';
  btn.onmouseover=null;btn.onmouseout=null;
}

// Calendar notes & marked items (localStorage)
function calSaveNotes(cid){
  var ta=document.getElementById(cid+'_notes');
  if(ta) localStorage.setItem('cal_notes_'+cid,ta.value);
}
function calAddItem(cid){
  var inp=document.getElementById(cid+'_input');
  if(!inp||!inp.value.trim()) return;
  var items=JSON.parse(localStorage.getItem('cal_items_'+cid)||'[]');
  items.push({name:inp.value.trim(),marked:true,ts:Date.now()});
  localStorage.setItem('cal_items_'+cid,JSON.stringify(items));
  inp.value='';
  calRenderItems(cid);
}
function calRemoveItem(cid,idx){
  var items=JSON.parse(localStorage.getItem('cal_items_'+cid)||'[]');
  items.splice(idx,1);
  localStorage.setItem('cal_items_'+cid,JSON.stringify(items));
  calRenderItems(cid);
}
function calToggleMark(cid,idx){
  var items=JSON.parse(localStorage.getItem('cal_items_'+cid)||'[]');
  if(items[idx]) items[idx].marked=!items[idx].marked;
  localStorage.setItem('cal_items_'+cid,JSON.stringify(items));
  calRenderItems(cid);
}
function calRenderItems(cid){
  var el=document.getElementById(cid+'_items');
  if(!el) return;
  var items=JSON.parse(localStorage.getItem('cal_items_'+cid)||'[]');
  el.innerHTML=items.map(function(it,i){
    var starColor=it.marked?'var(--ch)':'var(--tm)';
    return '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:var(--lz-s2);border-radius:4px;margin-bottom:4px;border:1px solid var(--lz-b)">'
      +'<span onclick="calToggleMark(\''+cid+'\','+i+')" style="cursor:pointer;color:'+starColor+';font-size:.85rem">&#x2605;</span>'
      +'<span style="flex:1;font-size:.78rem;color:var(--cr)">'+it.name+'</span>'
      +'<span onclick="calRemoveItem(\''+cid+'\','+i+')" style="cursor:pointer;color:var(--tm);font-size:.7rem;opacity:.6">&#x2715;</span>'
      +'</div>';
  }).join('');
}
// Restore saved notes and items on page load
(function(){
  for(var i=0;i<20;i++){
    var cid='cal_'+i;
    var ta=document.getElementById(cid+'_notes');
    if(ta){var saved=localStorage.getItem('cal_notes_'+cid);if(saved)ta.value=saved;}
    calRenderItems(cid);
  }
})();

// Filter by category
function filterFCCat(cat){
  document.querySelectorAll('.fccattab').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)'});
  event.target.style.background='var(--g)';event.target.style.color='#fff';
  document.querySelectorAll('.fc-cat').forEach(el=>{
    if(cat==='all'){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
    else{
      if(el.dataset.cat===cat){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
      else el.style.display='none';
    }
  });
}
