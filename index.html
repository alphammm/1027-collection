<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1024 Collection | 中国机制币珍藏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="data.js"></script>
<script src="auctions.js"></script>
<style>
:root{--lz:#002B5C;--lz-deep:#001a3a;--lz-light:#003d80;--lz-s:#0a1e3d;--lz-s2:#112a4d;--lz-b:#1a3a66;--lz-bl:#2a4a7a;--g:#C5A258;--gl:#dfc080;--gb:#e8c84a;--gd:#9a7d3a;--cr:#f5f0e8;--t:#e8e4dc;--td:#8a9ab8;--tm:#5a6a88;--w:#fff;--r:#c44040;--gr:#4a9868;--ch:#ffd700;--sv:#b8c0c8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond','Noto Serif SC',Georgia,serif;background:var(--lz-deep);color:var(--t);line-height:1.7;min-height:100vh}
.hero{text-align:center;padding:90px 20px 60px;background:linear-gradient(180deg,var(--lz) 0%,var(--lz-deep) 100%);border-bottom:2px solid var(--gd);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(197,162,88,.06) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent)}
.hero-logo{font-size:.82rem;letter-spacing:.5em;color:var(--g);text-transform:uppercase;margin-bottom:18px;font-weight:500}
.hero h1{font-size:3.4rem;font-weight:700;color:var(--cr);letter-spacing:.08em;margin-bottom:6px}
.hero .cn-title{font-size:2.6rem;color:var(--g);font-family:'Noto Serif SC',serif;font-weight:600;letter-spacing:.2em;margin-bottom:24px}
.hero .tagline{font-size:1rem;color:var(--td);max-width:660px;margin:0 auto;font-style:italic}
.lang-toggle{position:fixed;top:14px;right:18px;z-index:200;display:flex;gap:3px;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:5px;padding:2px}
.lang-toggle button{background:0;border:0;color:var(--td);padding:3px 10px;border-radius:3px;cursor:pointer;font-family:'EB Garamond',serif;font-size:.82rem;transition:.2s}
.lang-toggle button.active{background:var(--g);color:var(--lz-deep);font-weight:600}

/* COIN SHOWCASE BAR */
.showcase-bar{padding:20px 0;background:var(--lz-s);border-bottom:1px solid var(--lz-b);overflow:hidden;position:relative}
.showcase-bar::before,.showcase-bar::after{content:'';position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none}
.showcase-bar::before{left:0;background:linear-gradient(90deg,var(--lz-s),transparent)}
.showcase-bar::after{right:0;background:linear-gradient(-90deg,var(--lz-s),transparent)}
.showcase-track{display:flex;gap:12px;padding:0 24px;overflow-x:auto;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.showcase-track::-webkit-scrollbar{display:none}
.sc-card{flex:0 0 180px;height:280px;background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:8px;padding:10px;cursor:pointer;transition:.25s;text-align:center;position:relative;display:flex;flex-direction:column}
.sc-card:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.sc-img{flex:1;width:100%;border-radius:6px;background:var(--lz);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.sc-img img{max-width:100%;max-height:100%;object-fit:contain}
.sc-img .coin-icon{font-size:3rem;opacity:.2;color:var(--gd)}
.sc-info{flex-shrink:0;padding-top:8px}
.sc-name{font-size:.78rem;color:var(--cr);font-family:'Noto Serif SC',serif;font-weight:600;line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-grade{font-size:.65rem;color:var(--g);font-weight:600}
.sc-val{font-size:.6rem;color:var(--td);margin-top:2px}

nav{display:flex;justify-content:center;gap:5px;padding:12px 16px;background:var(--lz);border-bottom:1px solid var(--lz-b);position:sticky;top:0;z-index:100;flex-wrap:wrap}
nav button{background:0;border:1px solid var(--lz-b);color:var(--td);padding:6px 14px;border-radius:4px;cursor:pointer;font-family:'EB Garamond','Noto Serif SC',serif;font-size:.84rem;transition:.2s;letter-spacing:.02em}
nav button:hover,nav button.active{background:var(--g);color:var(--lz-deep);border-color:var(--g);font-weight:600}
.container{max-width:1200px;margin:0 auto;padding:32px 20px}
.section{display:none;animation:fadeIn .3s ease}.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-size:1.5rem;color:var(--g);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.badge{font-size:.62rem;background:var(--g);color:var(--lz-deep);padding:2px 9px;border-radius:10px;font-weight:700}
.section-subtitle{font-size:.92rem;color:var(--td);font-style:italic;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--lz-b)}
.story{background:var(--lz-s);border:1px solid var(--lz-b);border-left:3px solid var(--g);border-radius:6px;padding:24px 28px;margin-bottom:28px;font-size:1rem;line-height:2;color:var(--t)}
.story .drop-cap::first-letter{float:left;font-size:3rem;line-height:1;padding-right:8px;color:var(--g);font-weight:700}
.chapter{text-align:center;padding:18px 0;margin:18px 0}
.chapter-num{font-size:.68rem;letter-spacing:.4em;color:var(--gd);text-transform:uppercase}
.chapter-title{font-size:1.25rem;color:var(--g);font-family:'Noto Serif SC',serif;font-weight:600;margin-top:4px}
.chapter-line{width:60px;height:1px;background:var(--gd);margin:10px auto 0}

/* CARDS */
.coin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.coin-card{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:18px;transition:.25s;position:relative;cursor:pointer}
.coin-card:hover{border-color:var(--gd);box-shadow:0 4px 24px rgba(0,0,0,.3);transform:translateY(-2px)}
.coin-card.champion{border-left:3px solid var(--ch)}.coin-card.runner{border-left:3px solid var(--sv)}
.coin-card .prov{font-size:.7rem;color:var(--tm);text-transform:uppercase;letter-spacing:.12em}
.coin-card .name-cn{font-size:1.1rem;font-weight:600;color:var(--cr);margin:3px 0 1px;font-family:'Noto Serif SC',serif}
.coin-card .name-en{font-size:.78rem;color:var(--td);font-style:italic}
.coin-card .grade-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.gt{font-size:.68rem;padding:2px 8px;border-radius:3px;font-weight:600;font-variant-numeric:tabular-nums}
.gt.owned{background:rgba(197,162,88,.2);color:var(--gl);border:1px solid rgba(197,162,88,.4)}
.gt.normal{background:var(--lz-s2);color:var(--tm);border:1px solid var(--lz-b)}
.coin-card .meta{font-size:.76rem;color:var(--td);margin-top:6px;font-style:italic}
.coin-card .value{font-size:.82rem;color:var(--g);margin-top:5px;font-weight:600}
.rb{position:absolute;top:12px;right:12px;font-size:.6rem;padding:2px 9px;border-radius:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rb.champ{background:rgba(255,215,0,.15);color:var(--ch);border:1px solid rgba(255,215,0,.35)}
.rb.ru{background:rgba(184,192,200,.12);color:var(--sv);border:1px solid rgba(184,192,200,.25)}

/* DETAIL PANEL */
.detail-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,26,58,.85);z-index:300;overflow-y:auto;padding:40px 20px}
.detail-overlay.open{display:block}
.detail-panel{max-width:800px;margin:0 auto;background:var(--lz-s);border:1px solid var(--lz-b);border-radius:10px;padding:32px;position:relative}
.detail-close{position:absolute;top:12px;right:16px;background:0;border:0;color:var(--td);font-size:1.5rem;cursor:pointer}
.detail-panel h2{color:var(--g);font-family:'Noto Serif SC',serif;font-size:1.3rem;margin-bottom:4px}
.detail-panel .den{color:var(--td);font-style:italic;font-size:.9rem;margin-bottom:16px}
.detail-panel .dmeta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:.85rem}
.detail-panel .dmeta div{padding:8px 12px;background:var(--lz-s2);border-radius:4px}
.detail-panel .dmeta .dl{color:var(--td);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em}
.detail-panel .dmeta .dv{color:var(--cr);font-weight:600;margin-top:2px}
.detail-panel .dh{color:var(--g);font-size:1rem;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--lz-b)}
.detail-panel .dprov{padding:8px 0;border-bottom:1px solid var(--lz-b);font-size:.85rem;display:flex;align-items:center;gap:8px}
.detail-panel .dprov .dot{width:8px;height:8px;border-radius:50%;background:var(--gd);flex-shrink:0}
.detail-panel .dprov .dot.you{background:var(--g);box-shadow:0 0 6px rgba(197,162,88,.5)}
.detail-panel .dauction{font-size:.82rem;padding:6px 0;border-bottom:1px solid var(--lz-b)}
.detail-panel .dauction .da-house{color:var(--g);font-weight:600}
.detail-panel .dauction .da-price{color:var(--ch);font-weight:600}
.detail-panel .at{font-size:.8rem;margin-bottom:8px}
.detail-panel .at th{position:static}

/* COLLECTOR MAP (SVG) */
.flow-map{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:20px;margin-bottom:24px;overflow-x:auto}
.flow-map svg{width:100%;min-width:800px;height:auto}
.flow-map text{font-family:'EB Garamond','Noto Serif SC',serif}

/* COLLECTOR CARDS */
.coll-card{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;margin-bottom:12px;overflow:hidden;transition:.2s}
.coll-card:hover{border-color:var(--gd)}
.coll-card.key{border-left:3px solid var(--g)}
.coll-header{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.coll-header .ch-name{font-weight:600;font-size:1.02rem;color:var(--cr);font-family:'Noto Serif SC',serif}
.coll-header .ch-en{font-size:.8rem;color:var(--td);font-style:italic}
.coll-header .ch-toggle{color:var(--g);font-size:1.2rem;transition:.3s}
.coll-header .ch-toggle.open{transform:rotate(180deg)}
.cm{display:inline-block;font-size:.65rem;padding:2px 8px;border-radius:3px;font-weight:600;letter-spacing:.04em;margin-left:8px}
.cm.buy{background:rgba(74,152,104,.2);color:var(--gr)}.cm.sell{background:rgba(196,64,64,.2);color:var(--r)}.cm.hold{background:rgba(197,162,88,.15);color:var(--gd)}
.coll-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.coll-body.open{max-height:2000px}
.coll-inner{padding:0 20px 20px}
.coll-inner .ci-section{margin-top:14px}
.coll-inner .ci-title{color:var(--g);font-size:.85rem;font-weight:600;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--lz-b)}
.coll-inner .ci-text{font-size:.85rem;color:var(--td);line-height:1.7}
.coll-inner .ci-coin{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(26,58,102,.5);font-size:.84rem}
.coll-inner .ci-coin .cc-name{color:var(--cr)}.coll-inner .ci-coin .cc-grade{color:var(--g)}.coll-inner .ci-coin .cc-val{color:var(--td)}

/* AUCTION TABLE */
.at{width:100%;border-collapse:collapse;font-size:.84rem}
.at th{text-align:left;padding:9px 12px;background:var(--lz-s2);color:var(--g);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--gd);font-weight:600;position:sticky;top:46px;z-index:10}
.at td{padding:9px 12px;border-bottom:1px solid var(--lz-b);vertical-align:top}
.at tr:hover{background:rgba(197,162,88,.04)}
.at .price{color:var(--ch);font-weight:600;white-space:nowrap}

/* DRAGON & WISHLIST */
.dragon-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:7px}
.dragon-item{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:6px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;font-size:.88rem;transition:.15s}
.dragon-item:hover{border-color:var(--lz-bl)}
.dragon-item .dp{font-size:.66rem;color:var(--tm);letter-spacing:.08em;min-width:40px}
.wish-card{background:var(--lz-s);border:1px solid var(--lz-b);border-left:3px solid var(--gd);border-radius:8px;padding:16px 20px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:.2s}
.wish-card:hover{border-left-color:var(--g)}
.wish-card .name-cn{font-weight:600;font-family:'Noto Serif SC',serif;font-size:1rem;color:var(--cr)}
.wish-card .name-en{font-size:.78rem;color:var(--td);font-style:italic}
.wish-card .est{color:var(--g);font-weight:600;font-size:.92rem;white-space:nowrap}
.wish-card .rarity{font-size:.72rem;color:var(--gd);margin-top:2px}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-bar input{flex:1;background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:4px;padding:8px 14px;color:var(--t);font-family:'EB Garamond',serif;font-size:.92rem;outline:none}
.search-bar input:focus{border-color:var(--g)}
.search-bar select{background:var(--lz-s2);border:1px solid var(--lz-b);border-radius:4px;padding:8px 10px;color:var(--t);font-family:'EB Garamond',serif;font-size:.85rem;outline:none}

.strategy-block{background:var(--lz-s);border:1px solid var(--lz-b);border-radius:8px;padding:24px;margin-bottom:14px}
.strategy-block h3{color:var(--g);margin-bottom:12px;font-size:1.1rem}
.strategy-block ul{list-style:none;padding:0}
.strategy-block li{padding:6px 0;color:var(--td);font-size:.9rem;border-bottom:1px solid var(--lz-b)}
.strategy-block li:last-child{border:0}
.strategy-block li strong{color:var(--cr)}

footer{text-align:center;padding:44px 20px;color:var(--tm);font-size:.75rem;border-top:1px solid var(--lz-b);margin-top:44px;letter-spacing:.04em}
footer .gold{color:var(--gd)}

.coll-regions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px}
@media(max-width:640px){.hero h1{font-size:2rem}.hero .cn-title{font-size:1.3rem}.stats-bar{gap:6px}.stat{min-width:90px;padding:8px 12px}.coin-grid{grid-template-columns:1fr}.dragon-list{grid-template-columns:1fr}.stat-expand-inner{columns:1}.detail-panel{padding:20px}.coll-regions-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="lang-toggle"><button class="active" onclick="setLang('cn')">中文</button><button onclick="setLang('en')">EN</button></div>

<div class="hero">
  <div class="hero-logo">Private Numismatic Registry</div>
  <h1>1024 COLLECTION</h1>
  <div class="cn-title">壹零贰肆 珍藏</div>
  <div class="tagline" data-cn="从龙洋开国，到帝制终章，从地方铸币的极限探索，到中央制度的最终定型，1024 的每一枚银元，都是时代刻下的坐标，共同汇成一部以银圆为文字的中国近代史" data-en="From the genesis of dragon dollars to the empire's final chapter, from the extreme experiments of provincial minting to the ultimate consolidation of central authority — every coin in the 1024 Collection is a coordinate carved by its era, together composing a modern history of China written in silver">从龙洋开国，到帝制终章，从地方铸币的极限探索，到中央制度的最终定型，1024 的每一枚银元，都是时代刻下的坐标，共同汇成一部以银圆为文字的中国近代史</div>
</div>

<!-- COIN SHOWCASE -->
<div class="showcase-bar"><div class="showcase-track" id="showcaseTrack"></div></div>

<nav id="mainNav"></nav>
<div class="container">
  <div class="section active" id="prologue"></div>
  <div class="section" id="highlights"></div>
  <div class="section" id="rankings"></div>
  <div class="section" id="masterpieces"></div>
  <div class="section" id="dragons"></div>
  <div class="section" id="yuanPortraits"></div>
  <div class="section" id="sunPortraits"></div>
  <div class="section" id="warlords"></div>
  <div class="section" id="fullCollection"></div>
  <div class="section" id="database"></div>
  <div class="section" id="wishlist"></div>
  <div class="section" id="strategy"></div>
  <div class="section" id="collectors"></div>
  <div class="section" id="coinFlow"></div>
  <div class="section" id="numisDB"></div>
  <div class="section" id="intel"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<footer><span class="gold">1024 COLLECTION</span> &copy; 2025 &mdash; Museum-Grade Chinese Numismatic Database<br>Sources: Heritage Auctions &middot; Stack's Bowers &middot; ChengXuan &middot; PCGS &middot; ShouXi.com &middot; ArtHitParade</footer>

<script>
let CL='cn';
function setLang(l){CL=l;document.querySelectorAll('.lang-toggle button').forEach(b=>b.classList.remove('active'));document.querySelector(`.lang-toggle button[onclick="setLang('${l}')"]`).classList.add('active');document.querySelectorAll('[data-cn]').forEach(e=>{e.textContent=e.getAttribute('data-'+l)})}

// NAV
const NAV=[
  {id:'prologue',cn:'序言',en:'Prologue'},
  {id:'highlights',cn:'至臻之藏',en:'The Finest'},
  {id:'rankings',cn:'高分藏品',en:'Top Grades'},
  {id:'masterpieces',cn:'大珍',en:'Masterpieces'},
  {id:'dragons',cn:'各省龙洋',en:'Provincial Dragons'},
  {id:'yuanPortraits',cn:'袁像银圆',en:'Yuan Shikai'},
  {id:'sunPortraits',cn:'孙像银圆',en:'Sun Yat-sen'},
  {id:'warlords',cn:'军阀银圆',en:'Republic Provincial'},
  {id:'fullCollection',cn:'全部拍品',en:'Full Collection'},
  {id:'database',cn:'全部藏品',en:'Full Holdings'},
  {id:'wishlist',cn:'圣杯',en:'The Grails'},
  {id:'strategy',cn:'收藏体系',en:'Collection System'},
  {id:'collectors',cn:'藏家档案',en:'Collector Profiles'},
  {id:'coinFlow',cn:'珍币流转',en:'Provenance Flow'},
  {id:'numisDB',cn:'机制币数据库',en:'Numismatic Database'},
  {id:'intel',cn:'市场情报',en:'Market Intelligence'}
];
const nav=document.getElementById('mainNav');
NAV.forEach((n,i)=>{const b=document.createElement('button');b.className=i===0?'active':'';b.setAttribute('data-cn',n.cn);b.setAttribute('data-en',n.en);b.textContent=n.cn;b.onclick=()=>{document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));document.getElementById(n.id).classList.add('active');b.classList.add('active')};nav.appendChild(b)});

// Shared: generate coin thumbnail HTML
function coinImgTag(c,size){
  size=size||120;
  const st=`width:${size}px;height:${size}px;object-fit:contain;border-radius:6px;background:var(--lz);`;
  if(c.img?.length) return `<img src="${c.img[0]}" alt="${c.cn}" style="${st}" onerror="this.outerHTML='<div style=\\'width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--lz);color:var(--gd);font-size:${size/3}px;opacity:.3\\'>&#x2742;</div>'">`;
  if(c.pcgs_cert){const cert=Array.isArray(c.pcgs_cert)?c.pcgs_cert[0]:c.pcgs_cert;return `<img src="https://images.pcgs.com/trueview/${cert}_medium.jpg" alt="${c.cn}" style="${st}" onerror="this.outerHTML='<div style=\\'width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--lz);color:var(--gd);font-size:${size/3}px;opacity:.3\\'>&#x2742;</div>'">`;}
  return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--lz);color:var(--gd);font-size:${size/3}px;opacity:.3">&#x2742;</div>`;
}

// COIN SHOWCASE — visual scrolling strip
const owned=COINS.filter(c=>c.myStatus==='owned');
const wanted=COINS.filter(c=>c.myStatus==='want');
const champs=owned.filter(c=>c.myRank&&(c.myRank.includes('冠军')||c.myRank.includes('亚军')||c.myRank.includes('季军')));

function showDetail(coinId){
  const c=COINS.find(x=>x.id===coinId);if(!c)return;
  const dp=document.getElementById('detailPanel');
  // Find related auction records from global DB
  const relatedAuctions=AUCTION_RECORDS.filter(r=>c.cn.includes(r.cn.split(' ')[0])||r.cn.includes(c.cn.substring(0,4)));

  const relatedCollectors=COLLECTORS.filter(col=>col.coins.some(cc=>cc.coin_id===c.id));
  // Tier labels
  const tierLabels=['至尊珍品','博物馆级','顶级珍品','高级珍品'];
  const tierLabelsEn=['Supreme Rarity','Museum Grade','Premium','High-End'];

  let h=`<button class="detail-close" onclick="closeDetail()">&times;</button>`;
  // Status badge
  const statusBadge=c.myStatus==='owned'?`<span style="display:inline-block;background:rgba(197,162,88,.2);color:var(--g);padding:3px 12px;border-radius:4px;font-size:.72rem;font-weight:700;letter-spacing:.06em;margin-bottom:10px">1024 COLLECTION</span>`
    :c.myStatus==='want'?`<span style="display:inline-block;background:rgba(154,125,58,.2);color:var(--gd);padding:3px 12px;border-radius:4px;font-size:.72rem;font-weight:700;letter-spacing:.06em;margin-bottom:10px">WISHLIST</span>`:'';
  h+=statusBadge;
  h+=`<h2>${c.cn}</h2><div class="den">${c.en}</div>`;

  // Coin images (local photos or PCGS TrueView)
  if(c.img?.length||c.pcgs_cert){
    h+=`<div style="display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding:8px 0">`;
    if(c.img?.length){
      c.img.forEach(src=>{
        h+=`<img src="${src}" alt="${c.cn}" style="max-height:200px;border-radius:6px;border:1px solid var(--lz-b);cursor:pointer" onerror="this.style.display='none'" onclick="window.open(this.src)">`;
      });
    }
    if(c.pcgs_cert){
      const certs=Array.isArray(c.pcgs_cert)?c.pcgs_cert:[c.pcgs_cert];
      certs.forEach(cert=>{
        h+=`<img src="https://images.pcgs.com/trueview/${cert}_medium.jpg" alt="PCGS TrueView ${cert}" style="max-height:200px;border-radius:6px;border:1px solid var(--lz-b);cursor:pointer" onerror="this.style.display='none'" onclick="window.open('https://www.pcgs.com/cert/${cert}')">`;
      });
    }
    h+=`</div>`;
  }

  // Metadata grid
  h+=`<div class="dmeta">
    <div><div class="dl">年代 Era</div><div class="dv">${c.era} (${c.year})</div></div>
    <div><div class="dl">造币厂 Mint</div><div class="dv">${c.mint}</div></div>
    <div><div class="dl">材质 / 规格</div><div class="dv">${c.metal} ${c.weight} ${c.diam}</div></div>
    <div><div class="dl">珍稀度 Rarity</div><div class="dv">${'&#9733;'.repeat(c.rarity)}${'&#9734;'.repeat(10-c.rarity)} <span style="color:var(--td);font-size:.72rem">${CL==='cn'?tierLabels[c.tier]||'':tierLabelsEn[c.tier]||''}</span></div></div>
    <div><div class="dl">PCGS Population</div><div class="dv">${c.pcgs_pop?.total||'N/A'}${c.pcgs_pop?.total?` <span style="color:var(--td);font-size:.72rem">枚获评</span>`:''}</div></div>
    <div><div class="dl">估值 Est.</div><div class="dv" style="color:var(--g);font-size:1.05rem">¥${c.est_rmb}</div></div>
    ${c.myStatus==='owned'?`<div style="grid-column:1/-1;background:rgba(197,162,88,.08);border:1px solid rgba(197,162,88,.25)"><div class="dl" style="color:var(--g)">本藏品 My Piece</div><div class="dv" style="color:var(--ch);font-size:1.1rem">${c.myGrade} ${c.myRank?'— '+c.myRank:''}</div></div>`:''}
  </div>`;

  // PCGS Pop breakdown (if available)
  const popKeys=Object.keys(c.pcgs_pop||{}).filter(k=>k!=='total'&&c.pcgs_pop[k]>0);
  if(popKeys.length>1){
    h+=`<div style="margin-bottom:16px"><div style="font-size:.72rem;color:var(--td);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">PCGS评级分布 Grade Distribution</div><div style="display:flex;flex-wrap:wrap;gap:4px">`;
    popKeys.forEach(k=>{
      const isMyGrade=c.myGrade&&c.myGrade.toLowerCase().replace(/[\s\/]/g,'').includes(k.toLowerCase());
      h+=`<span class="gt ${isMyGrade?'owned':'normal'}" style="font-size:.68rem">${k.toUpperCase()}: ${c.pcgs_pop[k]}</span>`;
    });
    h+=`</div></div>`;
  }

  // Story / History
  h+=`<div class="dh" data-cn="币种故事 Story" data-en="Story">${CL==='cn'?'币种故事':'Story'}</div>`;
  h+=`<div style="font-size:.92rem;color:var(--t);line-height:2;margin-bottom:8px;padding:12px 16px;background:var(--lz-s2);border-radius:6px;border-left:3px solid var(--gd)">${CL==='cn'?c.history_cn:c.history_en}</div>`;

  // PROVENANCE CHAIN — Timeline style
  if(c.provenance?.length){
    h+=`<div class="dh" data-cn="传承链 Provenance Chain" data-en="Provenance Chain">${CL==='cn'?'传承链 Provenance Chain':'Provenance Chain'}</div>`;
    h+=`<div style="position:relative;padding-left:20px;border-left:2px solid var(--lz-b);margin-left:8px">`;
    c.provenance.forEach((p,i)=>{
      const isMe=p.holder.includes('1024');
      const dotColor=isMe?'var(--g)':p.status?.includes('持有')?'var(--cr)':p.status?.includes('出售')||p.status?.includes('可售')?'var(--r)':'var(--gd)';
      const dotSize=isMe?12:8;
      h+=`<div style="position:relative;padding:10px 0 10px 16px;${i<c.provenance.length-1?'':''}">
        <span style="position:absolute;left:-${dotSize/2+1}px;top:14px;width:${dotSize}px;height:${dotSize}px;border-radius:50%;background:${dotColor};${isMe?'box-shadow:0 0 8px rgba(197,162,88,.6)':''}"></span>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px">
          <span style="${isMe?'color:var(--g);font-weight:700;font-size:1rem':'color:var(--cr);font-weight:600'}">${p.holder}</span>
          ${p.grade?`<span class="gt owned">${p.grade}</span>`:''}
          ${p.acquired?`<span style="color:var(--td);font-size:.72rem;background:var(--lz-s2);padding:1px 6px;border-radius:3px">${p.acquired}</span>`:''}
        </div>
        <div style="font-size:.78rem;color:var(--td);margin-top:2px">
          ${p.status?`<span style="margin-right:8px">${p.status}</span>`:''}
          ${p.price?`<span style="color:var(--g)">成本: ${p.price}</span>`:''}
          ${p.note?`<span style="margin-left:4px;color:var(--tm)">${p.note}</span>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }

  // AUCTION RECORDS — this coin
  if(c.auctions?.length){
    h+=`<div class="dh" data-cn="拍卖纪录 Auction Records" data-en="Auction Records">${CL==='cn'?'拍卖纪录':'Auction Records'}</div>`;

    c.auctions.forEach(a=>{
      h+=`<tr><td>${a.date}</td><td style="color:var(--g)">${a.house}</td><td>${a.grade||''}</td><td>${a.lot||''}</td><td class="price">${a.price_usd?'$'+a.price_usd.toLocaleString():''}${a.price_rmb?(a.price_usd?' / ':'')+'¥'+a.price_rmb.toLocaleString():''}</td><td style="color:var(--td);font-size:.75rem">${a.note||''}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }

  // INTELLIGENCE — related collectors and market signals
  h+=`<div class="dh" style="color:var(--gb)" data-cn="情报分析 Intelligence" data-en="Intelligence">${CL==='cn'?'情报分析':'Intelligence'}</div>`;
  h+=`<div style="font-size:.85rem;color:var(--td);line-height:1.8">`;
  // Which collectors hold same coin
  if(relatedCollectors.length){
    h+=`<div style="margin-bottom:10px"><span style="color:var(--g);font-weight:600">相关藏家:</span> `;
    relatedCollectors.forEach((col,i)=>{
      const theirCoin=col.coins.find(cc=>cc.coin_id===c.id);
      h+=`${i>0?' | ':''}${col.cn}（${col.loc_cn}）${theirCoin?.grade?' '+theirCoin.grade:''}${col.mode==='sell'?' <span style="color:var(--r);font-size:.72rem">[有出售意向]</span>':col.mode==='buy'?' <span style="color:var(--gr);font-size:.72rem">[积极买入]</span>':''}`;
    });
    h+=`</div>`;
  }
  // Market context: show other holders from provenance
  const otherHolders=c.provenance?.filter(p=>!p.holder.includes('1024')&&p.status?.includes('持有'))||[];
  if(otherHolders.length){
    h+=`<div style="margin-bottom:10px"><span style="color:var(--g);font-weight:600">当前已知持有者:</span> `;
    h+=otherHolders.map(p=>`${p.holder}${p.grade?' ('+p.grade+')':''}`).join('、');
    h+=`</div>`;
  }
  // Sellers / opportunities
  const sellers=c.provenance?.filter(p=>p.status?.includes('出售')||p.status?.includes('可售')||p.status?.includes('开价'))||[];
  if(sellers.length){
    h+=`<div style="margin-bottom:10px;padding:8px 12px;background:rgba(74,152,104,.08);border-radius:4px;border-left:3px solid var(--gr)"><span style="color:var(--gr);font-weight:600">潜在机会:</span> `;
    sellers.forEach(s=>{h+=`${s.holder} — ${s.status}${s.price?' ('+s.price+')':''}. `});
    h+=`</div>`;
  }
  // Population scarcity note
  if(c.pcgs_pop?.total&&c.pcgs_pop.total<=10){
    h+=`<div style="padding:6px 12px;background:rgba(197,162,88,.08);border-radius:4px;border-left:3px solid var(--gd);margin-bottom:8px"><span style="color:var(--gd);font-weight:600">极罕警示:</span> PCGS仅${c.pcgs_pop.total}枚获评，每枚流转都可能改变市场格局。</div>`;
  }
  // If owned — show rank context
  if(c.myStatus==='owned'&&c.myRank){
    h+=`<div style="padding:6px 12px;background:rgba(255,215,0,.08);border-radius:4px;border-left:3px solid var(--ch);margin-bottom:8px"><span style="color:var(--ch);font-weight:600">评级地位:</span> ${c.myGrade} — ${c.myRank}。在该品种的PCGS评级中占据顶尖位置。</div>`;
  }
  h+=`</div>`;

  dp.innerHTML=h;document.getElementById('detailOverlay').classList.add('open');document.body.style.overflow='hidden';
}

// Shared card renderer for coin sections
function renderCoinCards(coins){
  const tierLabel={0:'至珍',1:'极珍',2:'大珍',3:'珍品'};
  return coins.map(c=>{
    const isOwned=c.myStatus==='owned';const isWant=c.myStatus==='want';
    const borderSt=isOwned?'border-left:3px solid var(--g)':isWant?'border-left:3px solid var(--gd)':'';
    const statusBadge=isOwned?`<span style="background:var(--g);color:var(--lz-deep);font-size:.65rem;padding:1px 6px;border-radius:3px;font-weight:700">已入藏 ${c.myGrade||''}</span>`:isWant?`<span style="background:var(--gd);color:#fff;font-size:.65rem;padding:1px 6px;border-radius:3px;font-weight:700">圣杯目标</span>`:'';
    const rankBadge=c.myRank?`<span style="background:var(--ch);color:var(--lz-deep);font-size:.65rem;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:4px">${c.myRank}</span>`:'';
    // myCopies table for owned coins with multiple copies
    let copiesHtml='';
    if(isOwned&&c.myCopies&&c.myCopies.length>0){
      copiesHtml=`<div style="margin-top:10px;border-top:1px solid var(--lz-b);padding-top:8px"><div style="font-size:.7rem;color:var(--g);font-weight:600;margin-bottom:4px">我的藏品明细 (${c.myCopies.length}枚)</div><table style="width:100%;font-size:.75rem;color:var(--td);border-collapse:collapse"><tr style="color:var(--g);font-size:.68rem"><td>评级</td><td>来源</td><td>时间</td><td>成本</td><td>估价</td></tr>${c.myCopies.map(cp=>`<tr style="border-top:1px solid var(--lz-b)"><td style="padding:3px 4px;color:var(--cr)">${cp.grade}</td><td style="padding:3px 4px">${cp.source||'-'}</td><td style="padding:3px 4px">${cp.date||'-'}</td><td style="padding:3px 4px">${cp.cost||'-'}</td><td style="padding:3px 4px;color:var(--g)">${cp.est||'-'}</td></tr>`).join('')}</table></div>`;
    }
    return `<div class="coin-card" style="${borderSt};margin-bottom:10px;padding:16px" onclick="showDetail('${c.id}')">
      <div style="display:flex;gap:14px;align-items:flex-start">
        <div style="flex-shrink:0">${coinImgTag(c,100)}</div>
        <div style="flex:1;min-width:180px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
            <span style="color:var(--gd);font-size:.72rem;font-weight:600">${tierLabel[c.tier]||'珍品'} · T${c.tier}</span>
            <span style="color:var(--td);font-size:.72rem">${c.era} ${c.year}</span>
            ${statusBadge}${rankBadge}
          </div>
          <div class="name-cn" style="font-size:1.05rem">${c.cn}</div>
          <div class="name-en" style="font-size:.78rem;margin-bottom:6px">${c.en}</div>
          <div style="color:var(--td);font-size:.82rem;line-height:1.7">${c.history_cn?.substring(0,120)||''}${c.history_cn?.length>120?'...':''}</div>
          ${copiesHtml}
        </div>
        <div style="text-align:right;min-width:120px;flex-shrink:0">
          <div style="color:var(--g);font-weight:700;font-size:1rem;margin-bottom:4px">¥${c.est_rmb}</div>
          <div style="font-size:.72rem;color:var(--td)">PCGS Pop: ${c.pcgs_pop?.total||'N/A'}</div>
          <div style="font-size:.72rem;color:var(--td)">${'★'.repeat(Math.min(c.rarity,5))}${'☆'.repeat(Math.max(0,5-c.rarity))}</div>
          ${c.auctions?.length?`<div style="font-size:.7rem;color:var(--gd);margin-top:4px">${c.auctions.length}条拍卖纪录</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}
// Sort helpers
function sortByYear(coins){return [...coins].sort((a,b)=>{const ya=parseInt(a.year)||1900;const yb=parseInt(b.year)||1900;return ya-yb})}
function sortByCost(coins){return [...coins].sort((a,b)=>{const ca=parseFloat((a.est_rmb||'0').replace(/[^0-9.]/g,''))||0;const cb=parseFloat((b.est_rmb||'0').replace(/[^0-9.]/g,''))||0;return cb-ca})}
function makeSortBtns(gridId,coins){
  return `<div style="display:flex;gap:6px;margin-bottom:14px"><button class="dr-btn" style="background:var(--g);border:1px solid var(--lz-b);color:var(--lz-deep);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:'EB Garamond','Noto Serif SC',serif;font-size:.82rem" onclick="document.getElementById('${gridId}').innerHTML=renderCoinCards(sortByYear(window._coins_${gridId}));this.style.background='var(--g)';this.style.color='var(--lz-deep)';this.nextElementSibling.style.background='var(--lz-s)';this.nextElementSibling.style.color='var(--td)'">按时间</button><button class="dr-btn" style="background:var(--lz-s);border:1px solid var(--lz-b);color:var(--td);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:'EB Garamond','Noto Serif SC',serif;font-size:.82rem" onclick="document.getElementById('${gridId}').innerHTML=renderCoinCards(sortByCost(window._coins_${gridId}));this.style.background='var(--g)';this.style.color='var(--lz-deep)';this.previousElementSibling.style.background='var(--lz-s)';this.previousElementSibling.style.color='var(--td)'">按估价</button></div>`;
}

    {from:'CJM',coin:'globe',to:'LGH',cn:'¥1200万',color:'#C5A258'},
    {from:null,coin:'globe',to:'ZY',cn:'MS63+ 最高分',color:'#4a9868'},

  fc+=`<div style="overflow-x:auto;margin-top:12px"><table style="width:100%;border-collapse:collapse;font-size:.82rem"><thead><tr style="background:var(--lz-s2);text-align:left"><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600">Date</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600" data-cn="拍卖行" data-en="House">拍卖行</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600" data-cn="币种" data-en="Coin">币种</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600" data-cn="评级" data-en="Grade">评级</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600">Lot</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600">USD</th><th style="padding:6px 10px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600">RMB</th></tr></thead><tbody>${AUCTION_RECORDS.sort((a,b)=>(b.usd||0)-(a.usd||0)||(b.rmb||0)-(a.rmb||0)).map(r=>`<tr style="border-bottom:1px solid rgba(26,58,102,.2)"><td style="padding:5px 10px;color:var(--td);font-size:.76rem">${r.date}</td><td style="padding:5px 10px;color:var(--td);font-size:.76rem">${r.house}</td><td style="padding:5px 10px;color:var(--cr)">${r.cn}</td><td style="padding:5px 10px;color:var(--td);font-size:.76rem">${r.grade}</td><td style="padding:5px 10px;color:var(--gd);font-size:.72rem">${r.lot||''}</td><td style="padding:5px 10px;color:var(--g);font-weight:600;white-space:nowrap">${r.usd?'$'+r.usd.toLocaleString():''}</td><td style="padding:5px 10px;color:var(--g);font-weight:600;white-space:nowrap">${r.rmb?'¥'+r.rmb.toLocaleString():''}</td></tr>`).join('')}</tbody></table></div></details>`;

  // ── Classification mode toggle ──
  fc+=`<div style="display:flex;gap:6px;margin-bottom:16px;align-items:center">
    <span style="color:var(--td);font-size:.78rem;margin-right:4px" data-cn="分类方式:" data-en="Group by:">分类方式:</span>
    <button class="fc-mode active" onclick="switchFCMode('source')" data-cn="按来源" data-en="By Source" style="padding:5px 14px;border-radius:4px;border:1px solid var(--g);background:var(--g);color:var(--lz-deep);cursor:pointer;font-size:.78rem;font-weight:600">按来源</button>
    <button class="fc-mode" onclick="switchFCMode('category')" data-cn="按品种" data-en="By Category" style="padding:5px 14px;border-radius:4px;border:1px solid var(--lz-b);background:var(--lz-s);color:var(--td);cursor:pointer;font-size:.78rem">按品种</button>
  </div>`;

  // ═══ VIEW 1: By Source ═══
  fc+=`<div id="fcBySource">`;
  // Source filter tabs
  fc+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">`;
  fc+=`<button class="fctab" onclick="filterFC('all')" style="padding:5px 12px;border-radius:4px;border:1px solid var(--lz-b);background:var(--g);color:#fff;cursor:pointer;font-size:.76rem">全部 (${totalLots})</button>`;
  houseOrder.forEach(hid=>{
    const cnt=allItems.filter(i=>i.house===hid).length;
    if(!cnt) return;
    fc+=`<button class="fctab" onclick="filterFC('${hid}')" style="padding:5px 12px;border-radius:4px;border:1px solid ${houseColors[hid]};background:var(--lz-s);color:var(--td);cursor:pointer;font-size:.76rem">${houseMap[hid]} (${cnt})</button>`;
  });
  fc+=`<button class="fctab" onclick="filterFC('graded')" style="padding:5px 12px;border-radius:4px;border:1px solid var(--lz-b);background:var(--lz-s);color:var(--td);cursor:pointer;font-size:.76rem" data-cn="仅评级币 (${gradedCount})" data-en="Graded Only (${gradedCount})">仅评级币 (${gradedCount})</button>`;
  fc+=`</div>`;

  // Per-house tables
  houseOrder.forEach(hid=>{
    const items=allItems.filter(i=>i.house===hid);
    if(!items.length) return;
    const hUSD=items.filter(i=>i.cur==='USD').reduce((s,i)=>s+i.t,0);
    const hRMB=items.filter(i=>i.cur!=='USD').reduce((s,i)=>s+i.t,0);
    fc+=`<div class="fc-house" data-house="${hid}" style="margin-bottom:24px">`;
    fc+=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:10px 14px;background:var(--lz-s);border-left:3px solid ${houseColors[hid]};border-radius:4px">`;
    fc+=`<div style="font-weight:700;color:var(--cr);font-size:.95rem">${houseMap[hid]} <span style="font-size:.76rem;color:var(--td);font-weight:400">${items.length} lots</span></div>`;
    const hTotalUSD=hUSD+Math.round(hRMB/FX);
    const hTotalRMB=hRMB+Math.round(hUSD*FX);
    fc+=`<div style="font-size:.82rem">`;
    fc+=`<span style="color:var(--g);font-weight:700">$${hTotalUSD.toLocaleString()}</span> `;
    fc+=`<span style="color:var(--td);font-size:.72rem">/</span> `;
    fc+=`<span style="color:var(--g);font-weight:700">¥${hTotalRMB.toLocaleString()}</span>`;
    fc+=`</div></div>`;
    fc+=renderFCTable(items);
    fc+=`</div>`;
  });
  fc+=`</div>`; // end fcBySource

  // ═══ VIEW 2: By Category ═══
  fc+=`<div id="fcByCategory" style="display:none">`;
  // Category filter tabs
  fc+=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">`;
  fc+=`<button class="fccattab" onclick="filterFCCat('all')" style="padding:5px 12px;border-radius:4px;border:1px solid var(--lz-b);background:var(--g);color:#fff;cursor:pointer;font-size:.76rem">全部 (${totalLots})</button>`;
  catDefs.forEach(cd=>{
    const cnt=allItems.filter(i=>i._cat===cd.id).length;
    if(!cnt) return;
    fc+=`<button class="fccattab" onclick="filterFCCat('${cd.id}')" style="padding:5px 12px;border-radius:4px;border:1px solid var(--lz-b);background:var(--lz-s);color:var(--td);cursor:pointer;font-size:.76rem">${cd.cn} (${cnt})</button>`;
  });
  fc+=`</div>`;

  catDefs.forEach(cd=>{
    const items=allItems.filter(i=>i._cat===cd.id);
    if(!items.length) return;
    const catUSD=items.filter(i=>i.cur==='USD').reduce((s,i)=>s+i.t,0);
    const catRMB=items.filter(i=>i.cur!=='USD').reduce((s,i)=>s+i.t,0);
    fc+=`<div class="fc-cat" data-cat="${cd.id}" style="margin-bottom:24px">`;
    fc+=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:8px;padding:10px 14px;background:var(--lz-s);border-left:3px solid var(--g);border-radius:4px">`;
    fc+=`<div style="font-weight:700;color:var(--cr);font-size:.95rem" data-cn="${cd.cn}" data-en="${cd.en}">${cd.cn} <span style="font-size:.76rem;color:var(--td);font-weight:400">${items.length} lots</span></div>`;
    const catTotalUSD=catUSD+Math.round(catRMB/FX);
    const catTotalRMB=catRMB+Math.round(catUSD*FX);
    fc+=`<div style="font-size:.82rem">`;
    fc+=`<span style="color:var(--g);font-weight:700">$${catTotalUSD.toLocaleString()}</span> `;
    fc+=`<span style="color:var(--td);font-size:.72rem">/</span> `;
    fc+=`<span style="color:var(--g);font-weight:700">¥${catTotalRMB.toLocaleString()}</span>`;
    fc+=`</div></div>`;
    fc+=renderFCTable(items);
    fc+=`</div>`;
  });
  fc+=`</div>`; // end fcByCategory

  document.getElementById('fullCollection').innerHTML=fc;

  // Helper: render a table of items
  function renderFCTable(items){
    let t=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:.8rem"><thead><tr style="background:var(--lz-s2);text-align:left">
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em">#</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em">Lot</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em" data-cn="来源" data-en="Source">来源</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em" data-cn="拍品" data-en="Item">拍品</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em" data-cn="评级" data-en="Grade">评级</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em">USD</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em">RMB</th>
      <th style="padding:6px 8px;color:var(--g);border-bottom:2px solid var(--gd);font-size:.72rem;font-weight:600;letter-spacing:.04em" data-cn="预估市价" data-en="Est.">预估市价</th>
    </tr></thead><tbody>`;
    items.forEach((it,i)=>{
      const usdVal=it.cur==='USD'?it.t:Math.round(it.t/FX);
      const rmbVal=it.cur==='USD'?Math.round(it.t*FX):it.t;
      const isGraded=it.grade&&(it.grade.includes('PCGS')||it.grade.includes('NGC')||it.grade.includes('GBCA'));
      const gc=isGraded?'color:var(--ch);font-weight:600':'color:var(--td)';
      const origUSD=it.cur==='USD';
      t+=`<tr class="fc-row" data-house="${it.house}" data-cat="${it._cat}" data-graded="${isGraded?1:0}" style="border-bottom:1px solid rgba(26,58,102,.2)">
        <td style="padding:5px 8px;color:var(--td)">${i+1}</td>
        <td style="padding:5px 8px;color:var(--gd);font-weight:600;font-size:.72rem">${it.lot}</td>
        <td style="padding:5px 8px;font-size:.68rem;color:${houseColors[it.house]};font-weight:600">${it.house}</td>
        <td style="padding:5px 8px;color:var(--cr);max-width:300px;font-family:'Noto Serif SC',serif">${it.cn}</td>
        <td style="padding:5px 8px;${gc};font-size:.74rem;white-space:nowrap">${it.grade||'—'}</td>
        <td style="padding:5px 8px;${origUSD?'color:var(--g);font-weight:600':'color:var(--td)'};white-space:nowrap">$${usdVal.toLocaleString()}</td>
        <td style="padding:5px 8px;${origUSD?'color:var(--td)':'color:var(--g);font-weight:600'};white-space:nowrap">¥${rmbVal.toLocaleString()}</td>
        <td style="padding:5px 8px;color:var(--gr);font-size:.76rem;white-space:nowrap">${it.est_mkt||'—'}</td>
      </tr>`;
    });
    t+=`</tbody></table></div>`;
    return t;
  }
})();

// Switch between source/category modes
function switchFCMode(mode){
  document.querySelectorAll('.fc-mode').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)';b.style.borderColor='var(--lz-b)';b.classList.remove('active')});
  event.target.style.background='var(--g)';event.target.style.color='var(--lz-deep)';event.target.style.borderColor='var(--g)';event.target.classList.add('active');
  document.getElementById('fcBySource').style.display=mode==='source'?'block':'none';
  document.getElementById('fcByCategory').style.display=mode==='category'?'block':'none';
}

// Filter by source
function filterFC(mode){
  document.querySelectorAll('.fctab').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)'});
  event.target.style.background='var(--g)';event.target.style.color='#fff';
  document.querySelectorAll('.fc-house').forEach(el=>{
    if(mode==='all'){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
    else if(mode==='graded'){
      el.style.display='block';
      let vis=0;
      el.querySelectorAll('.fc-row').forEach(r=>{
        if(r.dataset.graded==='1'){r.style.display='';vis++}else{r.style.display='none'}
      });
      if(!vis) el.style.display='none';
    }
    else{
      if(el.dataset.house===mode){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
      else el.style.display='none';
    }
  });
}

// Subscribe to auction calendar reminder
function subscribeAuction(evt,name,date){
  evt.stopPropagation();
  const btn=evt.target;
  // Generate .ics calendar event
  const now=new Date();
  const uid=now.getTime()+'@1024collection';
  const dtStart=date.replace(/[^0-9]/g,'').substring(0,8)||now.toISOString().replace(/[-:]/g,'').substring(0,8);
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//1024 Collection//Auction Calendar//EN',
    'BEGIN:VEVENT',
    'UID:'+uid,
    'DTSTART;VALUE=DATE:'+dtStart,
    'SUMMARY:'+name,
    'DESCRIPTION:1024 Collection 拍卖提醒 — '+name+' ('+date+')',
    'BEGIN:VALARM','TRIGGER:-P7D','ACTION:DISPLAY','DESCRIPTION:拍卖提醒: '+name+' 7天后开始','END:VALARM',
    'BEGIN:VALARM','TRIGGER:-P1D','ACTION:DISPLAY','DESCRIPTION:拍卖提醒: '+name+' 明天开始','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_')+'.ics';
  a.click();URL.revokeObjectURL(url);
  btn.textContent=CL==='cn'?'已下载 .ics':'Downloaded .ics';
  btn.style.background='var(--gr)';btn.style.color='#fff';btn.style.borderColor='var(--gr)';
  btn.onmouseover=null;btn.onmouseout=null;
}

// Filter by category
function filterFCCat(cat){
  document.querySelectorAll('.fccattab').forEach(b=>{b.style.background='var(--lz-s)';b.style.color='var(--td)'});
  event.target.style.background='var(--g)';event.target.style.color='#fff';
  document.querySelectorAll('.fc-cat').forEach(el=>{
    if(cat==='all'){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
    else{
      if(el.dataset.cat===cat){el.style.display='block';el.querySelectorAll('.fc-row').forEach(r=>r.style.display='')}
      else el.style.display='none';
    }
  });
}
</script>
